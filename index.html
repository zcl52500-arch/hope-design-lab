<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · v22.0 最终复刻版</title>
<style>
/* 界面 UI */
body { margin:0; font-family: sans-serif; background:#F4F6F9; display:flex; flex-direction:column; height:100vh; }
.header { background:white; padding:20px; border-bottom:1px solid #ddd; }
.main { display:flex; flex:1; overflow:hidden; }
.editor { width:35%; border-right:1px solid #ddd; padding:20px; overflow-y:auto; background:#fafafa; }
.preview { width:65%; padding:40px; overflow-y:auto; background:white; }
pre { background:#eee; padding:10px; border-radius:5px; font-size:12px; white-space: pre-wrap; word-wrap: break-word; }
.copy-btn { background:#2E84C5; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; margin-bottom:10px; }
.hint { font-size:13px; color:#666; line-height:1.6; background:#fff9e6; padding:10px; border-radius:5px; border-left:4px solid #FFD100; margin-bottom:15px;}
</style>
</head>
<body>

<div class="header">
  <h1 style="margin:0; font-size:18px; color:#333;">🍓 HOPE Design Lab v22.0 <span style="color:#76B92E;">(微信后台锁死版)</span></h1>
</div>

<div class="main">
  <div class="editor">
    <div class="hint">说明：由于微信屏蔽自动脚本，请点击下方按钮复制对应的标题模块，然后直接粘贴到微信后台修改文字。</div>
    
    <h3>1. 一级标题模块 (01)</h3>
    <button class="copy-btn" onclick="copyToClipboard('h1_01')">复制 01 标题代码</button>
    <div id="h1_01" style="display:none;">
      <section style="margin: 50px 0 30px; position: relative; clear: both;">
        <section style="display: flex; align-items: flex-end;">
          <section style="font-size: 80px; font-weight: 900; color: #EBF4E2; font-family: Arial; line-height: 1; margin-right: 15px;">01</section>
          <section style="padding-bottom: 10px;">
            <section style="margin-bottom: 8px;">
              <span style="display: inline-block; width: 10px; height: 10px; background: #FFD100; border-radius: 50%;"></span>
              <span style="font-size: 13px; font-weight: bold; color: #FFD100; letter-spacing: 2px; margin-left: 5px; font-family: Arial;">PART ONE</span>
            </section>
            <section style="font-size: 24px; font-weight: bold; color: #2E84C5; line-height: 1.3;">这里输入标题文字</section>
          </section>
        </section>
        <section style="color: #76B92E; font-size: 35px; font-weight: 900; margin: 10px 0 0 10px;">↘</section>
      </section>
    </div>

    <h3>2. 一级标题模块 (02)</h3>
    <button class="copy-btn" onclick="copyToClipboard('h1_02')">复制 02 标题代码</button>
    <div id="h1_02" style="display:none;">
      <section style="margin: 50px 0 30px; position: relative; clear: both;">
        <section style="display: flex; align-items: flex-end;">
          <section style="font-size: 80px; font-weight: 900; color: #EBF4E2; font-family: Arial; line-height: 1; margin-right: 15px;">02</section>
          <section style="padding-bottom: 10px;">
            <section style="margin-bottom: 8px;">
              <span style="display: inline-block; width: 10px; height: 10px; background: #FFD100; border-radius: 50%;"></span>
              <span style="font-size: 13px; font-weight: bold; color: #FFD100; letter-spacing: 2px; margin-left: 5px; font-family: Arial;">PART TWO</span>
            </section>
            <section style="font-size: 24px; font-weight: bold; color: #2E84C5; line-height: 1.3;">这里输入标题文字</section>
          </section>
        </section>
        <section style="color: #76B92E; font-size: 35px; font-weight: 900; margin: 10px 0 0 10px;">↘</section>
      </section>
    </div>

    <h3>3. 一级标题模块 (03)</h3>
    <button class="copy-btn" onclick="copyToClipboard('h1_03')">复制 03 标题代码</button>
    <div id="h1_03" style="display:none;">
      <section style="margin: 50px 0 30px; position: relative; clear: both;">
        <section style="display: flex; align-items: flex-end;">
          <section style="font-size: 80px; font-weight: 900; color: #EBF4E2; font-family: Arial; line-height: 1; margin-right: 15px;">03</section>
          <section style="padding-bottom: 10px;">
            <section style="margin-bottom: 8px;">
              <span style="display: inline-block; width: 10px; height: 10px; background: #FFD100; border-radius: 50%;"></span>
              <span style="font-size: 13px; font-weight: bold; color: #FFD100; letter-spacing: 2px; margin-left: 5px; font-family: Arial;">PART THREE</span>
            </section>
            <section style="font-size: 24px; font-weight: bold; color: #2E84C5; line-height: 1.3;">这里输入标题文字</section>
          </section>
        </section>
        <section style="color: #76B92E; font-size: 35px; font-weight: 900; margin: 10px 0 0 10px;">↘</section>
      </section>
    </div>

  </div>

  <div id="preview-area" class="preview">
    <div style="color:#999; text-align:center; margin-top:100px;">点击左侧按钮复制样式，在微信后台粘贴即可</div>
  </div>
</div>

<script>
function copyToClipboard(elementId) {
  const node = document.getElementById(elementId);
  const preview = document.getElementById('preview-area');
  
  // 渲染预览
  preview.innerHTML = node.innerHTML;
  
  // 执行复制
  const range = document.createRange();
  range.selectNode(preview);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand('copy');
  
  alert("🍓 样式已复制！请直接在微信后台粘贴，然后修改标题文字。");
}
</script>

</body>
</html>
