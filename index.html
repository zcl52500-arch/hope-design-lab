<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · v28.0 核心锁死版</title>
<style>
* { box-sizing: border-box; }
body { margin:0; font-family: sans-serif; background:#F4F6F9; display:flex; flex-direction:column; height:100vh; }
header { background:white; padding:15px 30px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center; }
.main { display:grid; grid-template-columns:1fr 1fr; flex:1; overflow:hidden; }
textarea { width:100%; height:100%; padding:30px; border:none; outline:none; font-size:15px; background:#fafafa; resize:none; }
.preview { background:white; overflow-y:auto; padding:40px; }
button { background:#2E84C5; color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-weight:bold; }

/* 金句样式 */
.gold-quote { background:#FFF7E0; border-left:6px solid #FFD100; padding:20px 25px; margin:30px 0; line-height:2.1; font-size:16px; color:#444; border-radius:0 8px 8px 0; text-align:justify; }

/* 蓝色胶囊 */
.blue-capsule { display:inline-block; background-color:#2E84C5; color:#fff; padding:5px 25px; border-radius:50px; font-size:14px; font-weight:bold; letter-spacing:1px; margin:20px 0; text-align:center; }

/* 分割线 */
.triple-dot { text-align:center; margin:60px 0; }
.triple-dot span { display:inline-block; border-radius:50%; margin:0 8px; }
.triple-dot .blue { width:8px; height:8px; background:#2E84C5; }
.triple-dot .yellow { width:12px; height:12px; background:#FFD100; }
.triple-dot .green { width:8px; height:8px; background:#76B92E; }
</style>
</head>
<body>

<header>
<h1 style="margin:0; font-size:18px; color:#333;">🍓 HOPE Design Lab <span style="color:#76B92E;">v28.0 核心锁死版</span></h1>
<button onclick="copyHTML()">一键复制 HTML 全文</button>
</header>

<div class="main">
<textarea id="input" oninput="generate()" placeholder="粘贴全文文案，如：# 01 标题内容..."></textarea>
<div id="output" class="preview"></div>
</div>

<script>
const inputEl = document.getElementById("input");
const outputEl = document.getElementById("output");
const engMap = {"01":"ONE","02":"TWO","03":"THREE","04":"FOUR","05":"FIVE","06":"SIX","07":"SEVEN","08":"EIGHT","09":"NINE","10":"TEN"};

function generate(){
    const text = inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
    const lines = text.split("\n");
    let html = "";

    lines.forEach(line => {
        line = line.trim();
        if(!line) return;

        // 一级标题
        if(line.startsWith("# ")){
            let raw = line.replace("# ","");
            let numStr = (raw.match(/^\d+/) || ["01"])[0];
            let titleStr = raw.replace(/^\d+/,"").trim();
            let engStr = engMap[numStr] || "SECTION";
            html += `
            <section style="margin:50px 0 40px; padding:0; clear:both; text-align:left;">
                <section style="display:inline-block; vertical-align:bottom; white-space:nowrap !important; margin:0;">
                    <span style="font-size:85px; font-weight:900; color:#EBF4E2; font-family:Arial, sans-serif; line-height:1; letter-spacing:-4px;">${numStr}</span>
                </section>
                <section style="display:inline-block; vertical-align:bottom; margin-left:15px; padding-bottom:10px; max-width:70%;">
                    <section style="margin-bottom:8px; line-height:1;">
                        <span style="display:inline-block; width:12px; height:12px; background-color:#FFD100; border-radius:50%; vertical-align:middle;"></span>
                        <span style="font-size:14px; font-weight:bold; color:#FFD100; letter-spacing:2px; margin-left:8px; font-family:Arial, sans-serif; vertical-align:middle;">PART ${engStr}</span>
                    </section>
                    <section style="font-size:28px; font-weight:bold; color:#2E84C5; line-height:1.3; font-family:sans-serif;">${titleStr}</section>
                </section>
                <section style="color:#76B92E; font-size:40px; font-weight:900; margin-top:15px; margin-left:10px; line-height:1;">↘</section>
            </section>`;
        }

        // 二级标题
        else if(line.startsWith("## ")){
            html += `
            <section style="margin:40px 0 20px; border-left:5px solid #76B92E; padding-left:15px; line-height:1.4;">
                <span style="font-size:21px; font-weight:bold; color:#2E84C5; font-family:sans-serif;">${line.replace("## ","")}</span>
            </section>`;
        }

        // 金句识别
        else if(line.startsWith("!!")){
            let content = line.replace("!!","");
            html += `<section class="gold-quote">${content}</section>`;
        }

        // 引用
        else if(line.startsWith("> ")){
            let content = line.replace("> ","");
            let theme = content.includes("编者按") ? "#2E84C5" : "#FFD100";
            let bg = content.includes("编者按") ? "#F2F7FB" : "#FCFAF2";
            html += `<section style="margin:35px 0; background-color:${bg}; border-left:6px solid ${theme}; padding:25px 30px; line-height:2.1; font-size:16px; color:#444; text-align:justify; border-radius:0 8px 8px 0;">${content}</section>`;
        }

        // 蓝色胶囊
        else if(line.startsWith("【") && line.endsWith("】")){
            let content = line.replace(/[【】]/g,'');
            html += `<div class="blue-capsule">${content}</div>`;
        }

        // 三色分割线
        else if(line==="---"){
            html += `<section class="triple-dot"><span class="blue"></span><span class="yellow"></span><span class="green"></span></section>`;
        }

        // 正文
        else {
            html += `<p style="text-indent:2.1em; line-height:2.2; font-size:17px; color:#333; margin-bottom:28px; text-align:justify; letter-spacing:0.5px; font-family:sans-serif;">${line}</p>`;
        }
    });

    outputEl.innerHTML = html;
}

function copyHTML(){
    const range = document.createRange();
    range.selectNode(outputEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    alert("🍓 HOPE v28.0 核心锁死版 复制成功！");
}

window.onload = generate;
</script>
</body>
</html>
