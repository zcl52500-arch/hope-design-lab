<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 学堂 | 像素级排版实验室 v9.0</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; }
        body { margin: 0; display: flex; height: 100vh; font-family: "PingFang SC", sans-serif; background: #f4f6f8; }
        
        #input-box { width: 35%; background: white; border-right: 1px solid #ddd; padding: 25px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #eee; border-radius: 8px; padding: 15px; font-size: 14px; line-height: 1.6; outline: none; background: #fafafa; }
        
        #preview-box { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .canvas { width: 100%; max-width: 600px; background: white; padding: 60px 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); min-height: 100%; }

        /* --- 修正后的精准样式 --- */
        /* 大数字：强制 01, 02, 03... */
        .big-num { font-size: 64px; color: #F0F0F0; font-weight: 900; font-family: Arial; line-height: 1; margin-top: 20px; }
        
        /* 蓝色主标题：字号加大，颜色锁定 */
        .main-title { color: var(--hope-blue); font-size: 22px; font-weight: bold; border-bottom: 4px solid var(--hope-blue); display: inline-block; padding-bottom: 6px; margin-bottom: 40px; }
        
        /* 胶囊样式：【文字】 */
        .capsule-label { background: var(--hope-blue); color: white; display: inline-block; padding: 5px 22px; border-radius: 50px; font-weight: bold; margin: 20px 0 10px; font-size: 15px; }
        
        /* 黄色高亮块：（文字） */
        .yellow-box { background: var(--hope-yellow); color: #333; padding: 18px 25px; border-radius: 4px; margin: 25px 0; font-weight: bold; line-height: 1.7; display: block; border: none; }

        /* 切片标题 */
        .slice-node { color: var(--hope-blue); font-size: 18px; font-weight: bold; margin: 35px 0 20px; display: flex; align-items: center; }
        .slice-node::before { content: "● 🧩"; color: var(--hope-green); margin-right: 12px; }

        /* 蓝色竖线 */
        .sidebar-quote { border-left: 5px solid var(--hope-blue); padding-left: 15px; margin: 30px 0 15px; font-weight: bold; font-size: 17px; color: #222; }

        /* 微信标准正文 */
        p { text-indent: 2em; line-height: 1.9; text-align: justify; margin-bottom: 25px; color: #444; font-size: 16px; }
    </style>
</head>
<body>

<div id="input-box">
    <h3 style="color:var(--hope-blue); margin-top:0;">🍓 HOPE 动态排版实验室</h3>
    <textarea id="editor" placeholder="在此粘贴...
示例输入：
03
PART THREE
【飞盘小组】
（这是一段需要高亮的话）
普通正文段落..."></textarea>
</div>

<div id="preview-box">
    <div class="canvas" id="render-target"></div>
</div>

<script>
    const editor = document.getElementById('editor');
    const target = document.getElementById('render-target');

    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        lines.forEach((line, i) => {
            // 1. 数字逻辑：只要是 1-3 位数字
            if (/^\d{1,3}$/.test(line)) {
                html += `<div class="big-num">${line.padStart(2, '0')}</div>`;
            }
            // 2. 胶囊逻辑：必须是【】包裹
            else if (line.startsWith('【') && line.endsWith('】')) {
                html += `<div class="capsule-label">${line.replace(/[【】]/g, '')}</div>`;
            }
            // 3. 高亮逻辑：必须是（）或 () 包裹
            else if ((line.startsWith('（') && line.endsWith('）')) || (line.startsWith('(') && line.endsWith(')'))) {
                html += `<div class="yellow-box">${line.replace(/[（）()]/g, '')}</div>`;
            }
            // 4. 标题逻辑：数字后的短句，或者是带有 PART 的句子
            else if (line.toUpperCase().includes('PART') || (i > 0 && /^\d{1,3}$/.test(lines[i-1]) && line.length < 25)) {
                html += `<div class="main-title">${line}</div>`;
            }
            // 5. 切片逻辑
            else if (line.includes('切片')) {
                html += `<div class="slice-node">${line.replace(/[●🧩]/g, '')}</div>`;
            }
            // 6. 竖线逻辑
            else if (line.startsWith('——') || line.startsWith('|')) {
                html += `<div class="sidebar-quote">${line.replace(/[—|]/g, '').trim()}</div>`;
            }
            // 7. 正文
            else {
                html += `<p>${line}</p>`;
            }
        });
        target.innerHTML = html || '<p style="color:#ccc; text-align:center; margin-top:100px;">等待输入内容...</p>';
    });
</script>
</body>
</html>
