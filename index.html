<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · 格式锁死版</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color:#F0F2F5; padding:20px;">

<div style="max-width:1200px; margin:0 auto;">
    <div style="margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
        <h1 style="font-size:24px; font-weight:bold; color:#333;">🍓 HOPE Design Lab <span style="font-size:12px; background:#2E84C5; color:#fff; padding:2px 8px; border-radius:10px;">v7.8 格式锁死版</span></h1>
        <button onclick="copyHTML()" style="background:#2E84C5; color:#fff; padding:10px 25px; border-radius:20px; border:none; cursor:pointer; font-weight:bold;">一键复制</button>
    </div>
    <div style="display:flex; gap:20px;">
        <textarea id="input" oninput="generate()" style="width:45%; height:800px; padding:20px; border-radius:12px; border:1px solid #cbd5e1;" placeholder="贴入文案..."></textarea>
        <div id="output" style="width:55%; background:white; padding:40px; border-radius:12px; overflow:auto; min-height:800px;"></div>
    </div>
</div>

<script>
const inputEl=document.getElementById("input");
const outputEl=document.getElementById("output");

function generate(){
    const text=inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
    const lines=text.split("\n");
    let html="";

    lines.forEach(line=>{
        line=line.trim();
        if(line==="") return;

        // 1. 一级标题：用 Table 物理强制分左右，数字背景色使用实色
        if(line.startsWith("# ")){
            let content = line.replace("# ","");
            let numMatch = content.match(/\d+/);
            let num = numMatch ? numMatch[0] : "01";
            let cleanTitle = content.replace(num, "").trim();
            
            html += `
            <table width="100%" cellspacing="0" cellpadding="0" border="0" style="margin: 40px 0 10px; border-collapse: collapse;">
                <tr>
                    <td valign="bottom" style="padding-bottom: 5px;">
                        <div style="margin-bottom: 8px;">
                            <span style="display:inline-block; width:10px; height:10px; background-color:#FFD100; border-radius:50%;"></span>
                            <span style="color:#FFD100; font-size:14px; font-weight:bold; margin-left:8px;">PART ${num}</span>
                        </div>
                        <div style="color:#2E84C5; font-size:24px; font-weight:bold; line-height:1.3;">${cleanTitle}</div>
                    </td>
                    <td width="80" align="right" valign="bottom" style="padding: 0;">
                        <span style="font-size:70px; color:#EBF4E2; font-family:Arial; font-weight:900; line-height:0.8;">${num.padStart(2, '0')}</span>
                    </td>
                </tr>
            </table>
            <div style="color:#76B92E; font-size:30px; font-weight:900; margin-bottom:30px;">↘</div>`;
        }
        // 2. 二级标题：绿色竖线
        else if(line.startsWith("## ")){
            html += `
            <table width="100%" cellspacing="0" cellpadding="0" border="0" style="margin: 30px 0 20px; border-collapse: collapse;">
                <tr>
                    <td width="4" style="background-color:#76B92E; padding:0;"></td>
                    <td style="padding-left:15px;">
                        <div style="font-size:19px; font-weight:bold; color:#2E84C5; line-height:1.4;">${line.replace("## ","")}</div>
                    </td>
                </tr>
            </table>`;
        }
        // 3. 引用块
        else if(line.startsWith("> ")){
            let quoteContent = line.replace("> ","");
            let isNote = quoteContent.includes("编者按");
            let theme = isNote ? "#2E84C5" : "#FFD100";
            let bg = isNote ? "#F2F7FB" : "#FCFAF2";
            html += `
            <table width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:30px 0; border-collapse: collapse;">
                <tr>
                    <td width="6" style="background-color:${theme}; padding:0;"></td>
                    <td style="background-color:${bg}; padding:25px; border-radius:0 8px 8px 0;">
                        <div style="line-height:1.8; color:#444; font-size:16px;">${quoteContent}</div>
                    </td>
                </tr>
            </table>`;
        }
        // 4. 分割线：用 Table 承载，圆点内填入空格防止被删
        else if(line==="---"){
            html += `
            <table align="center" cellspacing="0" cellpadding="0" border="0" style="margin:50px auto; border-collapse: collapse;">
                <tr>
                    <td style="padding:0 5px;"><div style="width:8px; height:8px; background-color:#2E84C5; border-radius:50%; font-size:1px;">&nbsp;</div></td>
                    <td style="padding:0 5px;"><div style="width:10px; height:10px; background-color:#FFD100; border-radius:50%; font-size:1px;">&nbsp;</div></td>
                    <td style="padding:0 5px;"><div style="width:8px; height:8px; background-color:#76B92E; border-radius:50%; font-size:1px;">&nbsp;</div></td>
                </tr>
            </table>`;
        }
        // 5. 正文
        else {
            html += `<div style="text-indent:2.1em; line-height:1.9; margin-bottom:25px; color:#333; font-size:16.5px; text-align:justify;">${line}</div>`;
        }
    });
    outputEl.innerHTML = html;
}

function copyHTML(){
    const range = document.createRange();
    range.selectNode(outputEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    alert("🍓 格式已锁死！请在微信后台粘贴并点击【保存】。");
}
</script>
</body>
</html>
