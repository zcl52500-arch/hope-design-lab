<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPE Design Lab</title>
    <!-- 引入最稳定的库链接 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50">
    <!-- 状态提示：如果 JS 运行失败，用户能看到这个 -->
    <div id="root">
        <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #94a3b8;">
            <div style="text-align: center;">
                <h1 style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">🚀 系统启动中...</h1>
                <p>如果长时间停留在该页面，请尝试刷新或检查 API Key 配置。</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        // ⚠️ 请在此处粘贴您的 API KEY
        const API_KEY = "AIzaSyC3SKI49gYQ0WZZzNJtaf5DyFkaN0OAs5s";

        function App() {
            const [tab, setTab] = useState('layout');
            const [text, setText] = useState('');

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b p-6 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-2 h-8 bg-blue-500 rounded-full"></div>
                            <h1 className="text-xl font-black">HOPE <span className="text-blue-500">Design Lab</span></h1>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setTab('layout')} className={`px-6 py-2 rounded-lg text-xs font-bold transition-all ${tab === 'layout' ? 'bg-white shadow-sm text-blue-500' : 'text-slate-500'}`}>排版</button>
                            <button onClick={() => setTab('poster')} className={`px-6 py-2 rounded-lg text-xs font-bold transition-all ${tab === 'poster' ? 'bg-white shadow-sm text-blue-500' : 'text-slate-500'}`}>海报</button>
                        </div>
                    </nav>

                    <main className="flex-1 p-6 md:p-10 max-w-4xl mx-auto w-full">
                        <div className="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-slate-100">
                            <h2 className="text-3xl font-black mb-2 tracking-tight">欢迎使用 HOPE 排版助手</h2>
                            <p className="text-slate-400 text-sm mb-8 font-medium">输入您的文章，AI 将为您自动优化视觉层级</p>
                            
                            <textarea 
                                className="w-full h-80 p-8 rounded-[1.5rem] bg-slate-50 border-none outline-none focus:ring-4 focus:ring-blue-50 transition-all text-lg leading-relaxed mb-6"
                                placeholder="在此粘贴您的文章内容..."
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                            />
                            
                            <button className="w-full py-6 bg-slate-900 text-white rounded-[1.5rem] font-black tracking-widest hover:bg-blue-600 transition-all shadow-lg active:scale-[0.98]">
                                开始智能排版
                            </button>
                        </div>
                    </main>
                    
                    <footer className="p-10 text-center opacity-20">
                        <p className="text-[10px] font-black uppercase tracking-[1em]">HOPE STUDIO 2025</p>
                    </footer>
                </div>
            );
        }

        // 使用 React 18 的渲染方式
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
