<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 长图复刻引擎 v19.0</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; }
        body { margin: 0; display: flex; height: 100vh; font-family: -apple-system, "PingFang SC", sans-serif; background: #eaeff2; }
        
        #editor-side { width: 30%; background: #fff; border-right: 1px solid #d1d9e0; padding: 25px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #e1e4e8; border-radius: 10px; padding: 18px; font-size: 14px; line-height: 1.6; outline: none; background: #fafafa; }
        
        #preview-side { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .canvas { width: 100%; max-width: 600px; background: white; padding: 60px 45px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); min-height: 100%; box-sizing: border-box; }

        /* --- 【核心】复刻：你描述的一级标题构图 --- */
        .h1-composite-box { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin: 50px 0 60px; 
            position: relative;
        }
        
        /* 左侧与中间的标题区 */
        .h1-left-content { flex: 1; }
        
        /* PART ONE：黄色文字 */
        .part-label-yellow { 
            color: var(--hope-yellow); 
            font-size: 14px; 
            font-weight: 900; 
            letter-spacing: 2px; 
            margin-bottom: 12px;
            font-family: 'Arial Black', sans-serif;
        }
        
        /* 大标题：蓝色，无下划线 */
        .title-blue-main { 
            color: var(--hope-blue); 
            font-size: 26px; 
            font-weight: bold; 
            line-height: 1.3; 
            margin-bottom: 15px;
        }
        
        /* 黄色小箭头 */
        .yellow-arrow { 
            color: var(--hope-yellow); 
            font-size: 30px; 
            font-weight: 900; 
            margin-top: 10px;
        }

        /* 右侧：巨大的数字 01 */
        .right-big-num { 
            font-size: 100px; 
            color: #F0F0F0; /* 极浅灰 */
            font-weight: 900; 
            font-family: Arial, sans-serif; 
            line-height: 1;
            margin-left: 20px;
        }

        /* --- 其他组件适配 --- */
        /* 胶囊：蓝色 */
        .capsule-blue { background: var(--hope-blue); color: white; display: inline-block; padding: 5px 24px; border-radius: 50px; font-weight: bold; font-size: 15.5px; margin: 30px 0 15px; }

        /* 高亮块：根据长度动态变化 */
        .box-solid { background: var(--hope-yellow); color: #222; padding: 25px 30px; margin: 35px 0; border-radius: 4px; font-weight: bold; font-size: 16.5px; line-height: 1.8; }
        .box-airy { background: rgba(255, 209, 0, 0.12); border-left: 6px solid var(--hope-yellow); padding: 25px 30px; margin: 35px 0; font-size: 16px; line-height: 1.95; border-radius: 0 4px 4px 0; }

        /* 微信正文 */
        p { text-indent: 2em; line-height: 1.95; text-align: justify; margin-bottom: 25px; color: #3F3F3F; font-size: 16px; }
        .li-dot { padding-left: 1.8em; position: relative; margin-bottom: 12px; }
        .li-dot::before { content: "●"; color: var(--hope-green); position: absolute; left: 0; }
    </style>
</head>
<body>

<div id="editor-side">
    <h3 style="color:var(--hope-blue);">🍓 HOPE 长图构图 v19.0</h3>
    <textarea id="input" placeholder="输入：
01
被误解的“装”与数字世界的自我保护"></textarea>
</div>

<div id="preview-side">
    <div class="canvas" id="render"></div>
</div>

<script>
    const input = document.getElementById('input');
    const render = document.getElementById('render');

    input.addEventListener('input', () => {
        const lines = input.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];

            // 1. 核心复刻识别：数字 + 下一行标题
            if (/^\d{1,2}$/.test(line) && i + 1 < lines.length) {
                const title = lines[i+1];
                html += `
                <div class="h1-composite-box">
                    <div class="h1-left-content">
                        <div class="part-label-yellow">PART ${numToEng(line)}</div>
                        <div class="title-blue-main">${title}</div>
                        <div class="yellow-arrow">↘</div>
                    </div>
                    <div class="right-big-num">${line.padStart(2, '0')}</div>
                </div>`;
                i++;
            }
            else if (line.startsWith('【')) {
                html += `<div class="capsule-blue">${line.replace(/[【】]/g, '')}</div>`;
            }
            else if (line.startsWith('（')) {
                const txt = line.replace(/[（）]/g, '');
                html += txt.length > 60 ? `<div class="box-airy">${txt}</div>` : `<div class="box-solid">${txt}</div>`;
            }
            else if (line.startsWith('●')) {
                html += `<div class="li-dot">${line.slice(1).trim()}</div>`;
            }
            else {
                html += `<p>${line}</p>`;
            }
        }
        render.innerHTML = html || '<p style="color:#ccc; text-align:center; margin-top:150px;">输入 01 试试...</p>';
    });

    function numToEng(n) {
        const words = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"];
        return words[parseInt(n)] || "SECTION";
    }
</script>
</body>
</html>
