<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE学堂排版工具 V36</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue";
background:#f5f6f8;
}

header{
background:white;
padding:18px 30px;
font-size:18px;
font-weight:600;
border-bottom:1px solid #eee;
}

.guide{
background:#fff;
padding:20px 30px;
border-bottom:1px solid #eee;
font-size:14px;
line-height:1.7;
}

.toggle{
cursor:pointer;
color:#2E84C5;
font-weight:600;
margin-bottom:10px;
}

.guide-content{
display:none;
}

.container{
display:flex;
height:calc(100vh - 160px);
}

.panel{
width:50%;
padding:30px;
box-sizing:border-box;
overflow:auto;
}

textarea{
width:100%;
height:80%;
border:1px solid #ddd;
border-radius:6px;
padding:15px;
font-size:15px;
line-height:1.7;
resize:none;
}

button{
margin-top:15px;
padding:10px 18px;
border:none;
background:#2E84C5;
color:white;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

.preview{
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<header>
HOPE学堂 · 微信公众号排版工具
</header>

<div class="guide">

<div class="toggle" onclick="toggleGuide()">▼ 使用语法说明</div>

<div class="guide-content" id="guide">

<p><b>封面</b></p>
<p>@封面<br>主标题<br>副标题</p>

<p><b>目录</b></p>
<p>@目录</p>

<p><b>一级标题</b></p>
<p># 01 标题</p>

<p><b>二级标题</b></p>
<p>## 小标题</p>

<p><b>蓝色标签</b></p>
<p>【HOPE学堂】</p>

<p><b>引用</b></p>
<p>> 编者按</p>

<p><b>分割线</b></p>
<p>---</p>

<p><b>金句</b></p>
<p>!! 教育不是灌输，而是点燃火焰</p>

<p><b>图片</b></p>
<p>![图](图片URL)<br>(图：图片说明)</p>

<p><b>作者</b></p>
<p>@作者<br>姓名<br>机构</p>

<p><b>关注</b></p>
<p>@关注</p>

</div>

</div>

<div class="container">

<div class="panel">

<textarea id="input">

@封面
HOPE学堂
未来教育的空间想象

@目录

# 01 为什么学习建筑

## 教育空间的变化

教育不是灌输，而是点燃火焰。

!! 教育不是灌输，而是点燃火焰

---

> 编者按
未来教育不仅改变课程，也改变空间。

![图](https://picsum.photos/800/400)
(图：学习空间示意)

@作者
张三
HOPE学堂研究员

@关注

</textarea>

<br>

<button onclick="generate()">生成排版</button>
<button onclick="copy()">复制排版</button>

</div>

<div class="panel">
<div id="output" class="preview"></div>
</div>

</div>

<script>

function toggleGuide(){

let g=document.getElementById("guide");

if(g.style.display==="block"){
g.style.display="none";
}else{
g.style.display="block";
}

}

function generate(){

let text=document.getElementById("input").value;
let lines=text.split("\n");

let html="";
let toc=[];

lines.forEach((line,i)=>{

line=line.trim();

if(line===""){
html+=`<section style="height:18px"></section>`;
}

else if(line==="@封面"){

let title=lines[i+1];
let sub=lines[i+2];

html+=`
<section style="text-align:center;margin:50px 0">

<div style="font-size:34px;font-weight:700;color:#222">${title}</div>

<div style="margin-top:10px;font-size:16px;color:#666">${sub}</div>

</section>
`;

}

else if(line==="@目录"){

html+=`<section id="toc"></section>`;

}

else if(line.startsWith("# ")){

let t=line.replace("# ","");
toc.push(t);

let num=t.match(/^\d+/);
let number=num?num[0]:"";

let title=t.replace(/^\d+\s*/,"");

html+=`
<section style="margin:55px 0 25px 0;text-align:center;position:relative">

<div style="font-size:64px;color:#eef2f6;font-weight:800;position:absolute;left:50%;transform:translateX(-50%);top:-30px">${number}</div>

<div style="font-size:24px;font-weight:700;color:#222;position:relative">${title}</div>

</section>
`;

}

else if(line.startsWith("## ")){

let t=line.replace("## ","");
toc.push(t);

html+=`
<section style="margin:40px 0 20px 0;border-left:4px solid #49B675;padding-left:12px">

<div style="font-size:18px;color:#2E84C5;font-weight:600">${t}</div>

</section>
`;

}

else if(line.startsWith("【") && line.endsWith("】")){

let t=line.replace(/[【】]/g,"");

html+=`
<section style="text-align:center;margin:35px 0">
<span style="display:inline-block;background:#2E84C5;color:#fff;padding:6px 28px;border-radius:999px;font-size:14px;font-weight:600">${t}</span>
</section>
`;

}

else if(line.startsWith(">")){

let t=line.replace(">","");

html+=`
<section style="margin:30px 0;background:#f4f7fb;padding:18px;border-left:4px solid #2E84C5">

<p style="margin:0;font-size:15px;color:#444;line-height:2">${t}</p>

</section>
`;

}

else if(line==="---"){

html+=`
<section style="text-align:center;margin:35px 0">

<span style="display:inline-block;width:8px;height:8px;background:#2E84C5;border-radius:50%;margin:0 4px"></span>
<span style="display:inline-block;width:8px;height:8px;background:#FFD34D;border-radius:50%;margin:0 4px"></span>
<span style="display:inline-block;width:8px;height:8px;background:#49B675;border-radius:50%;margin:0 4px"></span>

</section>
`;

}

else if(line.startsWith("!!")){

let t=line.replace("!!","");

html+=`
<section style="margin:25px 0">

<p style="background:#FFF6D9;padding:14px;border-radius:6px;font-size:16px;line-height:2">${t}</p>

</section>
`;

}

else if(line.startsWith("![")){

let url=line.match(/\((.*?)\)/)[1];

html+=`
<section style="margin:30px 0;text-align:center">

<img src="${url}" style="width:100%;border-radius:6px"/>

</section>
`;

}

else if(line.startsWith("(图：")){

let t=line.replace("(图：","").replace(")","");

html+=`
<section style="text-align:center;margin-top:-10px">

<p style="font-size:13px;color:#888">${t}</p>

</section>
`;

}

else if(line==="@作者"){

let name=lines[i+1];
let info=lines[i+2];

html+=`
<section style="margin:40px 0;padding:20px;background:#f7f7f7">

<p style="margin:0;font-weight:600">${name}</p>

<p style="margin:4px 0 0 0;color:#666">${info}</p>

</section>
`;

}

else if(line==="@关注"){

html+=`
<section style="text-align:center;margin:50px 0">

<div style="font-size:18px;font-weight:600;color:#2E84C5">关注 HOPE学堂</div>

<p style="color:#666;font-size:14px">一起探索未来教育与空间创新</p>

</section>
`;

}

else{

html+=`
<section style="margin:15px 0">

<p style="margin:0;font-size:16.5px;line-height:2.1;color:#333">${line}</p>

</section>
`;

}

});

if(toc.length>0){

let tocHTML=`<section style="margin:30px 0">`;

toc.forEach(t=>{
tocHTML+=`<p style="font-size:14px;color:#2E84C5">${t}</p>`;
});

tocHTML+=`</section>`;

html=html.replace(`<section id="toc"></section>`,tocHTML);

}

document.getElementById("output").innerHTML=html;

}

function copy(){

let range=document.createRange();

range.selectNode(document.getElementById("output"));

window.getSelection().removeAllRanges();

window.getSelection().addRange(range);

document.execCommand("copy");

alert("已复制，可直接粘贴到公众号");

}

</script>

</body>
</html>
