<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · v28 完全保底版</title>
<style>
body { margin:0; font-family: sans-serif; background:#F4F6F9; display:flex; flex-direction:column; height:100vh; }
header { background:white; padding:15px 30px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center; }
textarea { width:100%; height:100%; padding:30px; border:none; outline:none; font-size:15px; background:#fafafa; resize:none; }
.main { display:grid; grid-template-columns:1fr 1fr; flex:1; overflow:hidden; }
.preview { background:white; overflow-y:auto; padding:40px; }
button { background:#2E84C5; color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-weight:bold; }
</style>
<body>

<header>
  <h1 style="margin:0; font-size:18px; color:#333;">🍓 HOPE Design Lab <span style="color:#76B92E;">v28 完全保底版</span></h1>
  <button onclick="copyHTML()">一键复制 HTML 全文</button>
</header>

<div class="main">
  <textarea id="input" oninput="generate()" placeholder="粘贴文案，如：# 01 标题..."></textarea>
  <div id="output" class="preview"></div>
</div>

<script>
const inputEl = document.getElementById("input");
const outputEl = document.getElementById("output");
const engMap = {"01":"ONE","02":"TWO","03":"THREE","04":"FOUR","05":"FIVE","06":"SIX","07":"SEVEN","08":"EIGHT","09":"NINE","10":"TEN"};

function generate(){
  const text = inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
  const lines = text.split("\n");
  let html = "";

  lines.forEach(line => {
    line = line.trim();
    if(!line) return;

    // 一级标题
    if(line.startsWith("# ")){
      let raw = line.replace("# ","");
      let numStr = (raw.match(/^\d+/) || ["01"])[0];
      let titleStr = raw.replace(/^\d+/, "").trim();
      let engStr = engMap[numStr] || "SECTION";
      html += `
      <section style="margin:50px 0 40px; clear:both;">
        <span style="display:inline-block; font-size:85px; font-weight:900; color:#EBF4E2; line-height:1; vertical-align:bottom; letter-spacing:-4px;">${numStr}</span>
        <span style="display:inline-block; vertical-align:bottom; margin-left:15px; max-width:70%;">
          <div style="margin-bottom:8px;">
            <span style="display:inline-block; width:12px; height:12px; background:#FFD100; border-radius:50%; vertical-align:middle;"></span>
            <span style="font-size:14px; font-weight:bold; color:#FFD100; letter-spacing:2px; margin-left:8px; vertical-align:middle;">PART ${engStr}</span>
          </div>
          <div style="font-size:28px; font-weight:bold; color:#2E84C5; line-height:1.3;">${titleStr}</div>
        </span>
        <div style="color:#76B92E; font-size:40px; font-weight:900; margin-top:15px; margin-left:10px; line-height:1;">↘</div>
      </section>`;
    }

    // 二级标题
    else if(line.startsWith("## ")){
      html += `
      <section style="margin:40px 0 20px; border-left:5px solid #76B92E; padding-left:15px;">
        <span style="font-size:21px; font-weight:bold; color:#2E84C5;">${line.replace("## ","")}</span>
      </section>`;
    }

    // 引用
    else if(line.startsWith("> ")){
      let content = line.replace("> ","");
      let theme = content.includes("编者按") ? "#2E84C5" : "#FFD100";
      let bg = content.includes("编者按") ? "#F2F7FB" : "#FCFAF2";
      html += `<section style="margin:35px 0; background-color:${bg}; border-left:6px solid ${theme}; padding:25px; line-height:2.1; font-size:16px; color:#444; text-align:justify; border-radius:0 8px 8px 0;">${content}</section>`;
    }

    // 蓝色圆角胶囊
    else if(line.startsWith("【") && line.endsWith("】")){
      let content = line.replace(/[【】]/g,'');
      html += `<section style="text-align:center; margin:25px 0;">
        <span style="display:inline-block; background-color:#2E84C5; color:#fff; padding:5px 25px; border-radius:50px; font-size:14px; font-weight:bold; letter-spacing:1px;">${content}</span>
      </section>`;
    }

    // 三色分割线
    else if(line==="---"){
      html += `<section style="text-align:center; margin:60px 0;">
        <span style="display:inline-block; width:8px; height:8px; background:#2E84C5; border-radius:50%; margin:0 8px;"></span>
        <span style="display:inline-block; width:12px; height:12px; background:#FFD100; border-radius:50%; margin:0 8px;"></span>
        <span style="display:inline-block; width:8px; height:8px; background:#76B92E; border-radius:50%; margin:0 8px;"></span>
      </section>`;
    }

    // 正文
    else{
      html += `<p style="text-indent:2.1em; line-height:2.2; font-size:17px; color:#333; margin-bottom:28px; text-align:justify; letter-spacing:0.5px;">${line}</p>`;
    }
  });

  outputEl.innerHTML = html;
}

function copyHTML(){
  const range = document.createRange();
  range.selectNode(outputEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand('copy');
  alert("🍓 HOPE v28 完全保底版 复制成功！");
}

window.onload = generate;
</script>
</body>
</html>
