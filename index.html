<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · v20.0 智能感知版</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* 界面 UI */
* { box-sizing: border-box; }
body { margin:0; font-family:'Inter', sans-serif; background:#F4F6F9; height:100vh; display:flex; flex-direction:column; }
header { background:white; padding:15px 30px; border-bottom:1px solid #e1e4e8; flex-shrink:0; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.header-hint { font-size:12px; color:#666; background:#f8f9fa; padding:10px 15px; border-radius:6px; border-left:4px solid #76B92E; }
.header-hint code { background:#eee; padding:2px 4px; border-radius:3px; color:#2E84C5; font-family:monospace; font-weight:bold; }
.main-workspace { display:grid; grid-template-columns: 1fr 1fr; flex-grow:1; overflow:hidden; }
.editor-zone { border-right:1px solid #e1e4e8; background:#fafafa; }
textarea { width:100%; height:100%; padding:30px; border:none; outline:none; font-size:15px; line-height:1.8; resize:none; font-family:inherit; }
.preview-zone { background:white; overflow-y:auto; padding:40px; }
button { background:#2E84C5; color:#fff; padding:8px 20px; border-radius:20px; border:none; cursor:pointer; font-weight:bold; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1 style="margin:0; font-size:20px;">🍓 HOPE Design Lab <span style="font-size:11px; background:#76B92E; color:#fff; padding:2px 8px; border-radius:10px; margin-left:10px;">v20.0 智能对齐版</span></h1>
    <button onclick="copyHTML()">一键复制 HTML</button>
  </div>
  <div class="header-hint">
    💡 <b>智能识别：</b>
    一级标题请使用 <code># 01 标题</code> 格式，数字会自动关联英文。
  </div>
</header>

<div class="main-workspace">
  <div class="editor-zone">
    <textarea id="input" oninput="generate()" placeholder="输入 # 01 标题 试试看..."></textarea>
  </div>
  <div id="output" class="preview-zone"></div>
</div>

<script>
const inputEl = document.getElementById("input");
const outputEl = document.getElementById("output");

function numToEng(n){
  const words = ["ZERO","ONE","TWO","THREE","FOUR","FIVE","SIX","SEVEN","EIGHT","NINE","TEN"];
  return words[parseInt(n)] || "SECTION";
}

function generate(){
  const text = inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
  const lines = text.split("\n");
  let html = "";

  lines.forEach(line => {
    line = line.trim();
    if(!line) return;

    // --- 一级标题 (v20.0 锁死边框 + 智能匹配) ---
    if(line.startsWith("# ")){
      let rawContent = line.replace("# ","");
      // 匹配开头的数字
      let numMatch = rawContent.match(/^\d+/);
      let numStr = numMatch ? numMatch[0] : "01";
      // 移除数字后的剩余部分作为标题
      let cleanTitle = rawContent.replace(/^\d+/, "").trim();
      
      html += `
      <section style="margin: 50px 0 20px; clear: both;">
        <table width="100%" border="0" cellspacing="0" cellpadding="0" style="border:none; border-collapse:collapse; background:none;">
          <tr>
            <td width="95" valign="bottom" style="border:none; padding:0; margin:0;">
              <div style="font-size: 75px; font-weight: 900; color: #EBF4E2; font-family: Arial; line-height: 0.8; text-align: right;">${numStr.padStart(2,'0')}</div>
            </td>
            <td valign="bottom" style="border:none; padding: 0 0 5px 15px; margin:0;">
               <div style="font-size: 13px; font-weight: bold; color: #FFD100; margin-bottom: 8px; letter-spacing: 2px; font-family: Arial;">PART ${numToEng(numStr)}</div>
               <div style="font-size: 26px; font-weight: bold; color: #2E84C5; line-height: 1.2;">${cleanTitle}</div>
            </td>
          </tr>
        </table>
        <div style="color: #76B92E; font-size: 35px; font-weight: 900; margin: 15px 0 30px 10px;">↘</div>
      </section>`;
    }

    // --- 二级标题 (维持 v19.0 稳定结构) ---
    else if(line.startsWith("## ")){
      let content = line.replace("## ","");
      html += `
      <section style="margin: 35px 0 20px; padding: 0; clear: both;">
        <section style="display: inline-block; border-left: 4px solid #76B92E; padding-left: 12px; line-height: 1.4;">
          <span style="font-size: 21px; font-weight: bold; color: #2E84C5; display: inline-block; vertical-align: middle;">
            ${content}
          </span>
        </section>
      </section>`;
    }

    // --- 蓝色圆角胶囊 ---
    else if(line.startsWith("【") && line.endsWith("】")){
      let content = line.replace(/[【】]/g,'');
      html += `
      <section style="text-align: center; margin: 25px 0;">
        <span style="display: inline-block; background-color: #2E84C5; color: #ffffff; padding: 6px 28px; border-radius: 50px; font-size: 14px; font-weight: bold; letter-spacing: 1px;">
          ${content}
        </span>
      </section>`;
    }

    // --- 引用 ---
    else if(line.startsWith("> ")){
      let content = line.replace("> ","");
      let theme = content.includes("编者按") ? "#2E84C5" : "#FFD100";
      let bg = content.includes("编者按") ? "#F2F7FB" : "#FCFAF2";
      html += `
      <section style="margin: 30px 0; background-color: ${bg}; border-left: 5px solid ${theme}; padding: 25px; line-height: 2.1; font-size: 16px; color: #444; text-align: justify; border-radius: 0 8px 8px 0;">
        ${content}
      </section>`;
    }

    // --- 三色分割线 ---
    else if(line==="---"){
      html += `
      <section style="text-align: center; margin: 50px 0;">
        <span style="display: inline-block; width: 8px; height: 8px; background: #2E84C5; border-radius: 50%; margin: 0 6px;"></span>
        <span style="display: inline-block; width: 10px; height: 10px; background: #FFD100; border-radius: 50%; margin: 0 6px;"></span>
        <span style="display: inline-block; width: 8px; height: 8px; background: #76B92E; border-radius: 50%; margin: 0 6px;"></span>
      </section>`;
    }

    // --- 图片与正文 ---
    else if(line.startsWith("![") && line.includes("](")){
      let match=line.match(/!\[([^\]]*)\]\(([^)]+)\)/);
      if(match){ html += `<section style="text-align: center; margin: 30px 0;"><img src="${match[2]}" style="max-width: 100%; border-radius: 8px;"></section>`; }
    }
    else{
      html += `<p style="text-indent: 2.1em; line-height: 2.2; font-size: 16px; color: #333; margin-bottom: 25px; text-align: justify; letter-spacing: 0.3px;">${line}</p>`;
    }
  });

  outputEl.innerHTML = html;
}

function copyHTML(){
  const range = document.createRange();
  range.selectNode(outputEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand('copy');
  alert("🍓 HOPE v20.0 智能版已复制！");
}

window.onload = generate;
</script>
</body>
</html>
