<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 像素级复刻 v20.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; }
        body { margin: 0; display: flex; height: 100vh; font-family: -apple-system, "PingFang SC", sans-serif; background: #eaeff2; }
        
        #editor-side { width: 30%; background: #fff; border-right: 1px solid #d1d9e0; padding: 25px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #e1e4e8; border-radius: 10px; padding: 18px; font-size: 14px; line-height: 1.6; outline: none; background: #fafafa; }
        
        #preview-side { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .canvas { width: 100%; max-width: 600px; background: white; padding: 60px 45px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); min-height: 100%; box-sizing: border-box; }

        /* --- 【核心】复刻：图一的一级标题构图 --- */
        .h1-composite-box { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; /* 改为顶部对齐，让数字更显眼 */
            margin: 60px 0 60px; 
            position: relative;
        }
        
        .h1-left-content { flex: 1; }
        
        /* PART ONE 与 黄色圆点 */
        .part-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .yellow-dot {
            width: 8px;
            height: 8px;
            background-color: var(--hope-yellow);
            border-radius: 50%;
            margin-right: 10px;
        }
        .part-label-styled { 
            color: var(--hope-yellow); 
            font-size: 15px; 
            font-weight: 800; 
            letter-spacing: 3px; 
            font-family: 'Montserrat', sans-serif; /* 使用更接近的现代字体 */
            text-transform: uppercase;
        }
        
        /* 蓝色大标题：无下划线 */
        .title-blue-main { 
            color: var(--hope-blue); 
            font-size: 26px; 
            font-weight: bold; 
            line-height: 1.4; 
        }
        
        /* 黄色箭头：另起一行的视觉引导 */
        .yellow-arrow-deco { 
            color: var(--hope-yellow); 
            font-size: 32px; 
            font-weight: 900; 
            margin-top: 15px;
            line-height: 1;
        }

        /* 右侧：超大数字 01 */
        .right-big-num { 
            font-size: 110px; 
            color: #F2F2F2; 
            font-weight: 900; 
            font-family: Arial, Helvetica, sans-serif; 
            line-height: 0.8;
            margin-top: -10px; /* 向上提一点，增加错落感 */
        }

        /* --- 动态高亮块 --- */
        .box-solid { background: var(--hope-yellow); color: #222; padding: 25px 30px; margin: 35px 0; border-radius: 4px; font-weight: bold; font-size: 17px; }
        .box-airy { background: rgba(255, 209, 0, 0.1); border-left: 6px solid var(--hope-yellow); padding: 25px 30px; margin: 35px 0; font-size: 16px; border-radius: 0 4px 4px 0; color: #444; }

        p { text-indent: 2em; line-height: 2.0; text-align: justify; margin-bottom: 25px; color: #333; font-size: 16px; }
    </style>
</head>
<body>

<div id="editor-side">
    <h3 style="color:var(--hope-blue);">🍓 HOPE 像素复刻版 v20.0</h3>
    <textarea id="input" placeholder="输入 01 [回车] 标题即可"></textarea>
</div>

<div id="preview-side">
    <div class="canvas" id="render"></div>
</div>

<script>
    const input = document.getElementById('input');
    const render = document.getElementById('render');

    input.addEventListener('input', () => {
        const lines = input.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];

            // 核心识别逻辑
            if (/^\d{1,2}$/.test(line) && i + 1 < lines.length) {
                const title = lines[i+1];
                html += `
                <div class="h1-composite-box">
                    <div class="h1-left-content">
                        <div class="part-header">
                            <div class="yellow-dot"></div>
                            <div class="part-label-styled">PART ${numToEng(line)}</div>
                        </div>
                        <div class="title-blue-main">${title}</div>
                        <div class="yellow-arrow-deco">↘</div>
                    </div>
                    <div class="right-big-num">${line.padStart(2, '0')}</div>
                </div>`;
                i++;
            }
            else if (line.startsWith('（')) {
                const txt = line.replace(/[（）]/g, '');
                html += txt.length > 60 ? `<div class="box-airy">${txt}</div>` : `<div class="box-solid">${txt}</div>`;
            }
            else {
                html += `<p>${line}</p>`;
            }
        }
        render.innerHTML = html || '<p style="color:#ccc; text-align:center; margin-top:150px;">输入 01 试试...</p>';
    });

    function numToEng(n) {
        const words = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"];
        return words[parseInt(n)] || "SECTION";
    }
</script>
</body>
</html>
