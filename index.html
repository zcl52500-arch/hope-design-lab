<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 学堂 | 像素级排版实验室 v7.0</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; --hope-orange: #F39800; }
        body { margin: 0; display: flex; height: 100vh; font-family: "PingFang SC", sans-serif; background: #f0f2f5; }
        
        /* 布局 */
        #editor-area { width: 35%; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #eee; padding: 15px; font-size: 14px; line-height: 1.6; outline: none; resize: none; }
        
        #preview-area { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .canvas { width: 100%; max-width: 600px; background: white; padding: 65px 55px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 100%; }

        /* --- 核心组件库 --- */
        /* 1. 大背景数字 */
        .h1-num { font-size: 60px; color: #F0F0F0; font-weight: 800; font-family: Arial; line-height: 1; margin-bottom: -15px; }
        /* 2. 蓝色下划线标题 */
        .h1-title { color: var(--hope-blue); font-size: 20px; font-weight: bold; border-bottom: 3.5px solid var(--hope-blue); display: inline-block; padding-bottom: 5px; margin-bottom: 40px; }
        
        /* 3. 胶囊标题 (自动识别 [文字]) */
        .capsule-title { background: var(--hope-blue); color: white; display: inline-block; padding: 4px 20px; border-radius: 50px; font-weight: bold; margin: 25px 0 15px; font-size: 15px; }
        
        /* 4. 黄色/橙色背景块 (自动识别 (文字)) */
        .highlight-box { background: var(--hope-yellow); color: #333; padding: 15px 20px; border-radius: 4px; margin: 20px 0; font-weight: bold; line-height: 1.6; }

        /* 5. 绿色切片标题 (识别 ● 🧩) */
        .slice-header { color: var(--hope-blue); font-size: 18px; font-weight: bold; margin: 35px 0 20px; display: flex; align-items: center; }
        .slice-header::before { content: "● 🧩"; color: var(--hope-green); margin-right: 10px; }
        
        /* 6. 蓝色竖线 (精准识别，不再误伤) */
        .v-sidebar { border-left: 5px solid var(--hope-blue); padding-left: 15px; margin: 30px 0 15px; font-weight: bold; font-size: 16px; color: #222; }
        
        /* 正文 */
        p { text-indent: 2em; line-height: 1.85; text-align: justify; margin-bottom: 22px; color: #444; font-size: 15.5px; }
    </style>
</head>
<body>

<div id="editor-area">
    <h3 style="color:var(--hope-blue); margin-bottom:10px;">🍓 排版引擎 v7.0</h3>
    <textarea id="raw-input" placeholder="输入规范：
1. 纯数字(01) -> 背景大数
2. PART... -> 蓝线标题
3. [胶囊内容] -> 蓝色圆角
4. (黄色高光内容) -> 橙黄背景
5. 正常写文字 -> 2em 缩进正文"></textarea>
</div>

<div id="preview-area">
    <div class="canvas" id="canvas"></div>
</div>

<script>
    const input = document.getElementById('raw-input');
    const canvas = document.getElementById('canvas');

    input.addEventListener('input', () => {
        const lines = input.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        lines.forEach(line => {
            // 逻辑 A：数字识别
            if (/^\d+$/.test(line)) {
                html += `<div class="h1-num">${line.padStart(2, '0')}</div>`;
            }
            // 逻辑 B：胶囊标题 [内容]
            else if (line.startsWith('[') && line.endsWith(']')) {
                html += `<div class="capsule-title">${line.slice(1, -1)}</div>`;
            }
            // 逻辑 C：高光背景 (内容)
            else if (line.startsWith('(') && line.endsWith(')')) {
                html += `<div class="highlight-box">${line.slice(1, -1)}</div>`;
            }
            // 逻辑 D：蓝线主标题
            else if (line.toUpperCase().includes('PART')) {
                html += `<div class="h1-title">${line}</div>`;
            }
            // 逻辑 E：切片
            else if (line.includes('切片')) {
                html += `<div class="slice-header">${line.replace(/[●🧩]/g, '')}</div>`;
            }
            // 逻辑 F：蓝色竖线（仅针对带识别符的短行）
            else if (line.startsWith('|') || line.startsWith('——')) {
                html += `<div class="v-sidebar">${line.replace(/[|—]/g, '').trim()}</div>`;
            }
            // 默认正文
            else {
                html += `<p>${line}</p>`;
            }
        });
        canvas.innerHTML = html;
    });
</script>
</body>
</html>
