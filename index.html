<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 像素级重塑 v29.0</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #eaeff2; }
        #editor-side { width: 28%; background: #fff; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #ccc; border-radius: 8px; padding: 15px; font-size: 14px; outline: none; background: #fafafa; line-height: 1.6; }
        #preview-side { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        /* 强制撑开容器，找回原版呼吸感 */
        .canvas-container { width: 95%; max-width: 600px; background: white; padding: 60px 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .copy-btn { margin-bottom: 25px; padding: 14px 45px; background: #2E84C5; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div id="editor-side">
    <h3 style="color:#2E84C5;">🍓 像素级修复 v29.0</h3>
    <p style="font-size:12px;color:#999;">特别适配《3.8特稿》类文案：支持“编者按”识别</p>
    <textarea id="input" placeholder="贴入文案..."></textarea>
</div>

<div id="preview-side">
    <button class="copy-btn" onclick="copyToWechat()">✨ 点击一键复制（找回宽屏与重彩）</button>
    <div class="canvas-container" id="render"></div>
</div>

<script>
    const input = document.getElementById('input');
    const render = document.getElementById('render');

    input.addEventListener('input', () => {
        const lines = input.value.split('\n').filter(l => l.trim() !== '');
        let html = '';

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();

            // 1. 标题与悬浮大数字（针对特稿优化，强制右漂浮）
            if ((/^PART|^\d{1,2}$/i.test(line) || line.includes('切片')) && i + 1 < lines.length) {
                let numMatch = line.match(/\d+/);
                let num = numMatch ? numMatch[0] : "01";
                let title = lines[i+1].trim();
                html += `
                <section style="margin: 60px 0 50px; position: relative; width: 100%;">
                    <section style="float: right; font-size: 100px; color: #F0F0F0; font-family: Arial, sans-serif; font-weight: 900; line-height: 0.7; margin-top: -10px; margin-right: -10px;">${num.padStart(2, '0')}</section>
                    <section style="position: relative; z-index: 2;">
                        <section style="margin-bottom: 15px; display: flex; align-items: center;">
                            <section style="width: 12px; height: 12px; background-color: #FFD100; border-radius: 50%; margin-right: 12px;"></section>
                            <section style="color: #FFD100; font-size: 16px; font-weight: bold; letter-spacing: 4px; font-family: Arial;">PART ${numToEng(num)}</section>
                        </section>
                        <section style="color: #2E84C5; font-size: 28px; font-weight: bold; line-height: 1.3; max-width: 80%;">${title}</section>
                        <section style="color: #FFD100; font-size: 38px; font-weight: 900; margin-top: 15px;">↘</section>
                    </section>
                    <section style="clear: both;"></section>
                </section>`;
                i++;
            }
            // 2. 编者按专区（针对《3.8特稿》新增识别）
            else if (line.includes('编者按') || line.startsWith('以下文字')) {
                html += `
                <section style="margin: 30px 0; padding: 25px; border: 1.5px solid #2E84C5; border-radius: 8px; position: relative;">
                    <section style="position: absolute; top: -12px; left: 20px; background: white; padding: 0 10px; color: #2E84C5; font-weight: bold;">编者按</section>
                    <section style="color: #555; line-height: 1.8; font-size: 15px; text-align: justify;">${line.replace('编者按：', '')}</section>
                </section>`;
            }
            // 3. 蓝色胶囊（【】、正文、或署名）
            else if (line.startsWith('【') || line.startsWith('原创：') || line === '正文') {
                let content = line.replace(/[【】]/g, '');
                html += `
                <section style="margin: 30px 0 20px;">
                    <span style="display: inline-block; background-color: #2E84C5; color: #ffffff; padding: 6px 22px; border-radius: 50px; font-size: 15px; font-weight: bold; line-height: 1.2;">${content}</span>
                </section>`;
            }
            // 4. 感性引用段落（括号开头）
            else if (line.startsWith('（')) {
                let content = line.replace(/[（）]/g, '');
                html += `
                <section style="margin: 40px 0; background-color: #FCFAF2; border-left: 6px solid #FFD100; padding: 30px; line-height: 2.1; color: #444; font-size: 16px; text-align: justify;">${content}</section>`;
            }
            else {
                html += `<p style="text-indent: 2em; line-height: 2.2; margin-bottom: 25px; color: #333; font-size: 17px; text-align: justify;">${line}</p>`;
            }
        }
        render.innerHTML = html;
    });

    function numToEng(n) {
        const words = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"];
        return words[parseInt(n)] || "CHAPTER";
    }

    function copyToWechat() {
        const range = document.createRange();
        range.selectNode(document.getElementById('render'));
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('🍓 v29.0 宽屏修复版复制成功！请去公众号后台粘贴。');
    }
</script>
</body>
</html>
