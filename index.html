<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · 微信稳定版</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family: "微软雅黑", "宋体", Arial, sans-serif; background:#F4F6F9; }
header { padding:15px 30px; background:white; border-bottom:1px solid #e1e4e8; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.header-hint { font-size:13px; color:#666; background:#f8f9fa; padding:10px 15px; border-radius:6px; border-left:4px solid #76B92E; margin-bottom:10px; }
.header-hint code { background:#eee; padding:2px 5px; border-radius:3px; color:#2E84C5; font-weight:bold; }
.main-workspace { display:grid; grid-template-columns:1fr 1fr; height:80vh; }
.editor-zone { border-right:1px solid #e1e4e8; background:#fafafa; }
textarea { width:100%; height:100%; padding:30px; border:none; outline:none; font-size:15px; line-height:1.8; resize:none; }
.preview-zone { background:white; overflow-y:auto; padding:40px; }
button { background:#2E84C5; color:#fff; padding:8px 20px; border-radius:20px; border:none; cursor:pointer; font-weight:bold; }
button:hover { background:#1a6da1; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🍓 HOPE Design Lab <span style="font-size:12px; background:#76B92E; color:#fff; padding:2px 8px; border-radius:10px;">微信稳定版</span></h1>
    <button onclick="copyHTML()">一键复制 HTML</button>
  </div>
  <div class="header-hint">
    💡 <b>排版指令：</b> 
    <code># 01 标题</code> 一级(大数字) | 
    <code>## 标题</code> 二级(绿竖线蓝字) | 
    <code>【内容】</code> 蓝色圆角胶囊 | 
    <code>---</code> 三色点分割线 | 
    <code>></code> 引用
  </div>
</header>

<div class="main-workspace">
  <div class="editor-zone">
    <textarea id="input" oninput="generate()" placeholder="在此输入文案，右侧实时预览..."></textarea>
  </div>
  <div id="output" class="preview-zone"></div>
</div>

<script>
const inputEl=document.getElementById("input");
const outputEl=document.getElementById("output");

function numToEng(n){
  const words=["ZERO","ONE","TWO","THREE","FOUR","FIVE","SIX","SEVEN","EIGHT","NINE","TEN"];
  return words[parseInt(n)] || "SECTION";
}

function generate(){
  const text=inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
  const lines=text.split("\n");
  let html="";

  lines.forEach(line=>{
    line=line.trim();
    if(line==="") return;

    // 一级标题 (悬浮大数字)
    if(line.startsWith("# ")){
      let content=line.replace("# ","");
      let numMatch=content.match(/\d+/);
      let num=numMatch?numMatch[0]:"01";
      let cleanTitle=content.replace(num,"").trim();
      html+=`
      <table width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:50px 0 20px; border-collapse:collapse;">
        <tr>
          <td width="90" valign="bottom" align="right">
            <div style="font-size:75px; font-weight:900; color:#EBF4E2; line-height:0.8; font-family:Arial;">${num.padStart(2,'0')}</div>
          </td>
          <td valign="bottom" style="padding-left:15px;">
            <div style="margin-bottom:8px;">
              <span style="display:inline-block; width:12px; height:12px; background:#FFD100; border-radius:50%;"></span>
              <span style="font-size:14px; font-weight:bold; color:#FFD100; margin-left:8px; letter-spacing:2px;">PART ${numToEng(num)}</span>
            </div>
            <div style="font-size:26px; font-weight:bold; color:#2E84C5; line-height:34px;">${cleanTitle}</div>
          </td>
        </tr>
      </table>
      <div style="color:#76B92E; font-size:35px; font-weight:900; margin-bottom:40px; margin-left:10px;">↘</div>`;
    }

    // 二级标题 (绿竖线+蓝字)
    else if(line.startsWith("## ")){
      html+=`
      <table width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:35px 0 20px; border-collapse:collapse;">
        <tr>
          <td width="4" bgcolor="#76B92E">&nbsp;</td>
          <td style="padding-left:10px; font-size:16.5px; line-height:34px; color:#2E84C5; font-weight:bold;">${line.replace("## ","")}</td>
        </tr>
      </table>`;
    }

    // 蓝色圆角胶囊
    else if(line.startsWith("【") && line.endsWith("】")){
      html+=`
      <div style="text-align:center; margin:20px 0;">
        <span style="display:inline-block; background-color:#2E84C5; color:#fff; padding:6px 28px; border-radius:50px; font-size:14px; font-weight:bold; letter-spacing:1px; box-shadow:0 4px 8px rgba(46,132,197,0.15);">
          ${line.replace(/[【】]/g,'')}
        </span>
      </div>`;
    }

    // 引用块
    else if(line.startsWith("> ")){
      let content=line.replace("> ","");
      let theme=content.includes("编者按")?"#2E84C5":"#FFD100";
      let bg=content.includes("编者按")?"#F2F7FB":"#FCFAF2";
      html+=`
      <table width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:30px 0; border-collapse:collapse;">
        <tr>
          <td width="6" bgcolor="${theme}">&nbsp;</td>
          <td bgcolor="${bg}" style="padding:20px; font-size:16.5px; line-height:34px; color:#444; text-align:justify;">
            ${content}
          </td>
        </tr>
      </table>`;
    }

    // 三色点分割线
    else if(line==="---"){
      html+=`
      <table align="center" cellspacing="0" cellpadding="0" border="0" style="margin:60px auto; border-collapse:collapse;">
        <tr>
          <td style="padding:0 8px;"><div style="width:10px; height:10px; background:#2E84C5; border-radius:50%; font-size:1px;">&bull;</div></td>
          <td style="padding:0 8px;"><div style="width:12px; height:12px; background:#FFD100; border-radius:50%; font-size:1px;">&bull;</div></td>
          <td style="padding:0 8px;"><div style="width:10px; height:10px; background:#76B92E; border-radius:50%; font-size:1px;">&bull;</div></td>
        </tr>
      </table>`;
    }

    // 图片
    else if(line.startsWith("![") && line.includes("](")){
      let match=line.match(/!\[([^\]]*)\]\(([^)]+)\)/);
      if(match){ html+=`<div style="text-align:center; margin:30px 0;"><img src="${match[2]}" style="max-width:100%; border-radius:8px; display:block; margin:0 auto;"></div>`; }
    }

    // 正文
    else{
      html+=`<div style="text-indent:2.1em; line-height:34px; font-size:16.5px; color:#333; text-align:justify; margin-bottom:28px;">${line}</div>`;
    }
  });

  outputEl.innerHTML=html;
}

function copyHTML(){
  const range=document.createRange();
  range.selectNode(outputEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand('copy');
  alert("🍓 微信稳定版 HTML 已复制，可直接粘贴到公众号后台。");
}

window.onload=generate;
</script>
</body>
</html>
