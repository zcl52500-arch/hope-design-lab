<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPE 学堂 | 像素级无损排版</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; }
        body { background: #F5F5F5; margin: 0; display: flex; font-family: -apple-system, "Noto Sans SC", sans-serif; }
        
        /* 编辑区 */
        #input-area { width: 40%; height: 100vh; padding: 25px; border-right: 1px solid #DDD; box-sizing: border-box; background: #FFF; }
        textarea { width: 100%; height: 90%; border: 1px solid #EEE; padding: 15px; font-size: 14px; line-height: 1.6; border-radius: 6px; }
        
        /* 预览区 (模拟 PDF/微信 画布) */
        #preview-area { width: 60%; height: 100vh; overflow-y: auto; padding: 60px 50px; box-sizing: border-box; background: #F5F5F5; }
        .canvas { background: #FFF; width: 100%; max-width: 650px; margin: 0 auto; padding: 50px 45px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); min-height: 80vh; }

        /* PDF 风格组件样式 */
        .p-num { font-size: 60px; color: #EFEFEF; font-weight: 800; font-family: Arial; margin-bottom: -15px; line-height: 1; }
        .p-title { color: var(--hope-blue); font-size: 19px; font-weight: bold; border-bottom: 2.5px solid var(--hope-blue); display: inline-block; padding-bottom: 5px; margin-bottom: 40px; }
        .slice-h { color: var(--hope-blue); font-size: 17px; font-weight: bold; margin-top: 35px; display: flex; align-items: center; }
        .slice-h span { color: var(--hope-green); margin-right: 10px; }
        .v-line { border-left: 4px solid var(--hope-blue); padding-left: 12px; margin: 25px 0 15px; font-weight: bold; color: #333; }
        .arrow { color: var(--hope-yellow); font-size: 30px; margin: 15px 0 25px 2em; line-height: 1; }
        p { text-indent: 2em; line-height: 1.8; text-align: justify; color: #3F3F3F; margin-bottom: 22px; font-size: 15px; }
    </style>
</head>
<body>

<div id="input-area">
    <h3 style="color:#2E84C5; margin-top:0;">草莓的排版实验室</h3>
    <textarea id="editor" placeholder="在此粘贴文字..."></textarea>
    <p style="font-size:12px; color:#999; text-indent:0;">* 在右侧画布全选复制即可粘贴至公众号</p>
</div>

<div id="preview-area">
    <div class="canvas" id="render-box">
        <p style="color:#CCC; text-align:center; margin-top:100px;">等待输入内容...</p>
    </div>
</div>

<script>
    const editor = document.getElementById('editor');
    const renderBox = document.getElementById('render-box');

    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n').filter(l => l.trim() !== '');
        let html = '';
        lines.forEach(line => {
            const cleanLine = line.trim();
            if (/^0\d/.test(cleanLine)) {
                html += `<div class="p-num">${cleanLine}</div>`;
            } else if (cleanLine.includes('PART')) {
                html += `<div class="p-title">${cleanLine}</div>`;
            } else if (cleanLine.includes('切片')) {
                html += `<div class="slice-h"><span>● 🧩</span>${cleanLine}</div>`;
            } else if (cleanLine.includes('↘')) {
                html += `<div class="arrow">↘</div>`;
            } else if (cleanLine.includes('关于') || cleanLine.includes('——')) {
                html += `<div class="v-line">${cleanLine.replace(/[—|]/g, '')}</div>`;
            } else {
                html += `<p>${cleanLine}</p>`;
            }
        });
        renderBox.innerHTML = html || '<p style="color:#CCC; text-align:center; margin-top:100px;">等待输入内容...</p>';
    });
</script>

</body>
</html>
