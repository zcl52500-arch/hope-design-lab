<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · v28.0 生产对齐版</title>
<style>
/* 界面 UI */
* { box-sizing: border-box; }
body { margin:0; font-family: sans-serif; background:#F4F6F9; display:flex; flex-direction:column; height:100vh; }
header { background:white; padding:15px 30px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center; }
.main { display:grid; grid-template-columns: 1fr 1fr; flex:1; overflow:hidden; }
textarea { width:100%; height:100%; padding:30px; border:none; outline:none; font-size:15px; background:#fafafa; resize:none; }
.preview { background:white; overflow-y:auto; padding:40px; }
button { background:#2E84C5; color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-weight:bold; }
</style>
</head>
<body>

<header>
  <h1 style="margin:0; font-size:18px; color:#333;">🍓 HOPE Design Lab <span style="color:#76B92E;">v28.0 (对齐优化版)</span></h1>
  <button onclick="copyHTML()">一键复制 HTML 全文</button>
</header>

<div class="main">
  <textarea id="input" oninput="generate()" placeholder="粘贴全文，如：# 01 标题内容..."></textarea>
  <div id="output" class="preview"></div>
</div>

<script>
const inputEl = document.getElementById("input");
const outputEl = document.getElementById("output");
const engMap = {"01":"ONE","02":"TWO","03":"THREE","04":"FOUR","05":"FIVE","06":"SIX","07":"SEVEN","08":"EIGHT","09":"NINE","10":"TEN"};

function generate(){
  const text = inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
  const lines = text.split("\n");
  let html = "";

  lines.forEach(line => {
    line = line.trim();
    if(!line) return;

    // --- 一级标题 (物理底对齐方案) ---
    if(line.startsWith("# ")){
      let raw = line.replace("# ","");
      let numStr = (raw.match(/^\d+/) || ["01"])[0];
      let titleStr = raw.replace(/^\d+/, "").trim();
      let engStr = engMap[numStr] || "SECTION";
      
      html += `
      <section style="margin: 60px 0 40px; clear: both; background: transparent;">
        <table border="0" cellpadding="0" cellspacing="0" style="border:none !important; border-collapse:collapse; width:100%; table-layout: fixed;">
          <tr>
            <td width="22%" valign="bottom" style="border:none; padding:0; margin:0; text-align:right;">
              <span style="font-size: 82px; font-weight: 900; color: #EBF4E2; font-family: Arial, sans-serif; line-height: 1.1; white-space: nowrap; letter-spacing: -3px; display: inline-block;">${numStr}</span>
            </td>
            <td width="78%" valign="bottom" style="border:none; padding: 0 0 12px 15px; margin:0; text-align:left;">
              <div style="margin-bottom: 8px; line-height: 1;">
                <span style="display: inline-block; width: 12px; height: 12px; background-color: #FFD100; border-radius: 50%; vertical-align: middle;"></span>
                <span style="font-size: 14px; font-weight: bold; color: #FFD100; letter-spacing: 2px; margin-left: 8px; font-family: Arial, sans-serif; vertical-align: middle;">PART ${engStr}</span>
              </div>
              <div style="font-size: 26px; font-weight: bold; color: #2E84C5; line-height: 1.3; font-family: sans-serif;">${titleStr}</div>
            </td>
          </tr>
        </table>
        <div style="color: #76B92E; font-size: 40px; font-weight: 900; margin: 15px 0 0 10px; line-height: 1;">↘</div>
      </section>`;
    }

    // --- 二级标题 (经典稳定版) ---
    else if(line.startsWith("## ")){
      html += `
      <section style="margin: 40px 0 20px; border-left: 5px solid #76B92E; padding-left: 15px; line-height: 1.4;">
        <span style="font-size: 20px; font-weight: bold; color: #2E84C5;">${line.replace("## ","")}</span>
      </section>`;
    }

    // --- 引用 (编者按样式) ---
    else if(line.startsWith("> ")){
      let content = line.replace("> ","");
      let theme = content.includes("编者按") ? "#2E84C5" : "#FFD100";
      let bg = content.includes("编者按") ? "#F2F7FB" : "#FCFAF2";
      html += `<section style="margin: 35px 0; background-color: ${bg}; border-left: 6px solid ${theme}; padding: 25px 30px; line-height: 2.1; font-size: 16px; color: #444; text-align: justify;">${content}</section>`;
    }

    // --- 分割线 ---
    else if(line==="---"){
      html += `<section style="text-align: center; margin: 60px 0;"><span style="display: inline-block; width: 8px; height: 8px; background-color: #2E84C5; border-radius: 50%; margin: 0 8px;"></span><span style="display: inline-block; width: 12px; height: 12px; background-color: #FFD100; border-radius: 50%; margin: 0 8px;"></span><span style="display: inline-block; width: 8px; height: 8px; background-color: #76B92E; border-radius: 50%; margin: 0 8px;"></span></section>`;
    }

    // --- 正文 (优化行高与字距) ---
    else {
      html += `<p style="text-indent: 2.1em; line-height: 2.2; font-size: 17px; color: #333; margin-bottom: 28px; text-align: justify; letter-spacing: 0.5px;">${line}</p>`;
    }
  });

  outputEl.innerHTML = html;
}

function copyHTML(){
  const range = document.createRange();
  range.selectNode(outputEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand('copy');
  alert("🍓 HOPE v28.0 优化版复制成功！\n1. 物理锁死对齐\n2. 颜色、箭头精准对齐\n3. 彻底根除表格灰线");
}
window.onload = generate;
</script>
</body>
</html>
