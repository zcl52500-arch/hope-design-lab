<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · 微信兼容版</title>
<style>
body { background:#F4F6F9; margin:0; font-family:'Inter',sans-serif; padding:20px; }
textarea { width:45%; height:800px; padding:20px; font-size:15px; line-height:1.8; resize:none; }
.preview { width:50%; height:800px; padding:30px; background:#fff; overflow:auto; }
.container { display:flex; gap:20px; max-width:1400px; margin:0 auto; }
.btn { background:#2E84C5; color:#fff; padding:8px 20px; border-radius:20px; border:none; cursor:pointer; font-weight:bold; margin-bottom:15px; }
.btn:hover { background:#1a6da1; }
</style>
</head>
<body>

<div class="btn" onclick="copyHTML()">一键复制 HTML</div>
<div class="container">
<textarea id="input" placeholder="贴入文案...支持：# 一级标题，## 二级标题，【胶囊】，> 引用，--- 分割线" oninput="generate()"></textarea>
<div id="output" class="preview"></div>
</div>

<script>
const inputEl = document.getElementById("input");
const outputEl = document.getElementById("output");

function numToEng(n){
    const words = ["ZERO","ONE","TWO","THREE","FOUR","FIVE","SIX","SEVEN","EIGHT","NINE","TEN"];
    return words[parseInt(n)]||"SECTION";
}

function generate(){
    const lines = inputEl.value.replace(/\r/g,'').split("\n");
    let html='';
    lines.forEach(line=>{
        line=line.trim();
        if(!line) return;

        // 一级标题 悬浮大数字
        if(line.startsWith("# ")){
            let content=line.replace("# ","");
            let numMatch=content.match(/\d+/);
            let num=numMatch?numMatch[0]:"01";
            let clean=content.replace(num,'').trim();
            html+=`<div style="display:flex; align-items:flex-end; margin:50px 0 20px;">
                <div style="font-size:75px; font-weight:900; color:#EBF4E2; line-height:0.8; font-family:Arial;">${num.padStart(2,'0')}</div>
                <div style="padding-left:15px;">
                    <div style="margin-bottom:8px;">
                        <span style="display:inline-block;width:12px;height:12px;background:#FFD100;border-radius:50%;"></span>
                        <span style="font-size:14px;font-weight:bold;color:#FFD100;margin-left:8px;letter-spacing:2px;">PART ${numToEng(num)}</span>
                    </div>
                    <div style="font-size:26px;font-weight:bold;color:#2E84C5;line-height:1.3;">${clean}</div>
                </div>
            </div>
            <div style="color:#76B92E;font-size:35px;font-weight:900;margin-bottom:40px;margin-left:10px;">↘</div>`;
        }
        // 二级标题 左绿线蓝字
        else if(line.startsWith("## ")){
            let text=line.replace("## ","");
            html+=`<div style="display:flex; align-items:center; margin:35px 0;">
                <div style="width:4px;height:24px;background:#76B92E;margin-right:12px;"></div>
                <div style="font-size:16.5px; line-height:2.1; font-weight:bold; color:#2E84C5;">${text}</div>
            </div>`;
        }
        // 蓝色胶囊
        else if(line.startsWith("【") && line.endsWith("】")){
            let text=line.replace(/[【】]/g,'');
            html+=`<div style="text-align:center;margin:20px 0;">
                <span style="display:inline-block;background:#2E84C5;color:#fff;padding:6px 28px;border-radius:50px;font-size:14px;font-weight:bold;letter-spacing:1px;">${text}</span>
            </div>`;
        }
        // 引用
        else if(line.startsWith("> ")){
            let text=line.replace("> ","");
            let bg=text.includes("编者按")?"#F2F7FB":"#FCFAF2";
            let bar=text.includes("编者按")?"#2E84C5":"#FFD100";
            html+=`<div style="display:flex;margin:30px 0;">
                <div style="width:6px;background:${bar};margin-right:10px;"></div>
                <div style="background:${bg};padding:25px 20px; line-height:2.1; font-size:16.5px; color:#444; text-align:justify;">${text}</div>
            </div>`;
        }
        // 分割线三色点
        else if(line==="---"){
            html+=`<div style="text-align:center;margin:60px 0;">
                <span style="display:inline-block;width:10px;height:10px;background:#2E84C5;border-radius:50%;margin:0 5px;"></span>
                <span style="display:inline-block;width:12px;height:12px;background:#FFD100;border-radius:50%;margin:0 5px;"></span>
                <span style="display:inline-block;width:10px;height:10px;background:#76B92E;border-radius:50%;margin:0 5px;"></span>
            </div>`;
        }
        // 图片
        else if(line.startsWith("![") && line.includes("](")){
            let match=line.match(/!\[([^\]]*)\]\(([^)]+)\)/);
            if(match) html+=`<div style="text-align:center;margin:30px 0;"><img src="${match[2]}" style="max-width:100%;border-radius:8px;"></div>`;
        }
        // 正文
        else{
            html+=`<div style="font-size:16.5px; line-height:34px; color:#333; text-indent:2.1em; text-align:justify; margin-bottom:28px;">${line}</div>`;
        }
    });
    outputEl.innerHTML=html;
}

function copyHTML(){
    const range=document.createRange();
    range.selectNode(outputEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    alert("🍓 内容已复制，可直接粘贴到微信公众号后台！");
}

window.onload=generate;
</script>
</body>
</html>
