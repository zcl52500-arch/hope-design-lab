<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HOPE 学堂无损排版工具</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; display: flex; gap: 20px; }
        #input { width: 50%; height: 90vh; padding: 20px; border: 1px solid #ddd; }
        #preview { width: 50%; height: 90vh; background: white; padding: 40px; overflow-y: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        /* 下面是 HOPE 学堂的专属样式 */
        .p-text { text-indent: 2em; line-height: 1.75; margin-bottom: 20px; text-align: justify; color: #3F3F3F; }
        .hope-blue { color: #2E84C5; font-weight: bold; }
        .part-num { font-size: 50px; color: #EAEAEA; font-family: Arial; }
    </style>
</head>
<body>
    <textarea id="input" placeholder="请在这里粘贴智谱生成的带缩进的文字..."></textarea>
    <div id="preview">
        <div class="part-num">01</div>
        <div class="hope-blue" style="font-size:20px; margin-bottom:30px;">PART ONE</div>
        <div id="output">预览区（在这里复制到微信）</div>
    </div>
    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        input.addEventListener('input', (e) => {
            // 将普通文字转化为带 HOPE 格式的 HTML
            const lines = e.target.value.split('\n');
            output.innerHTML = lines.map(line => `<p class="p-text">${line}</p>`).join('');
        });
    </script>
</body>
</html>
