<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 像素级排版实验室 v13.0</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; --hope-light-yellow: rgba(255, 209, 0, 0.15); }
        body { margin: 0; display: flex; height: 100vh; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        
        /* 界面布局 */
        #editor-side { width: 30%; background: white; border-right: 1px solid #ddd; padding: 25px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #eee; border-radius: 12px; padding: 15px; font-size: 14px; line-height: 1.6; outline: none; background: #fafafa; }
        
        #preview-side { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .canvas { width: 100%; max-width: 600px; background: white; padding: 60px 45px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 100%; box-sizing: border-box; }

        /* --- 核心组件：根据图三美学重构 --- */
        
        /* H1 复合结构：左文字/右数字 */
        .h1-block { display: flex; justify-content: space-between; align-items: flex-end; margin: 40px 0 30px; border-bottom: 3px solid var(--hope-blue); padding-bottom: 12px; }
        .h1-content { flex: 1; }
        .h1-part { color: #BBB; font-size: 13px; font-weight: 800; letter-spacing: 2px; margin-bottom: 4px; }
        .h1-title { color: var(--hope-blue); font-size: 22px; font-weight: bold; line-height: 1.4; position: relative; }
        /* 那个关键的黄色小箭头 */
        .h1-title::after { content: " ↘"; color: var(--hope-yellow); font-size: 24px; font-weight: 900; }
        .h1-number { font-size: 72px; color: #F5F5F5; font-weight: 900; font-family: Arial; line-height: 0.7; margin-left: 15px; }

        /* 蓝色胶囊：更精致的比例 */
        .capsule { background: var(--hope-blue); color: white; display: inline-block; padding: 4px 22px; border-radius: 50px; font-weight: bold; font-size: 15px; margin: 25px 0 15px; letter-spacing: 0.5px; }

        /* 黄色高亮块：图三风格（引用块质感） */
        .highlight-box { background: var(--hope-light-yellow); border-left: 5px solid var(--hope-yellow); color: #333; padding: 20px 25px; margin: 30px 0; font-weight: 500; font-size: 16px; line-height: 1.8; text-align: justify; border-radius: 0 4px 4px 0; }

        /* 二级标题：绿色竖线 */
        .h2-green { border-left: 5px solid var(--hope-green); padding-left: 15px; font-size: 18px; font-weight: bold; color: #333; margin: 40px 0 20px; }

        /* 微信标准正文 */
        p { text-indent: 2em; line-height: 1.9; text-align: justify; margin-bottom: 22px; color: #444; font-size: 16px; letter-spacing: 0.3px; }

        /* 列表项 */
        .dot-item { padding-left: 1.6em; position: relative; margin-bottom: 12px; color: #555; line-height: 1.7; }
        .dot-item::before { content: "●"; color: var(--hope-green); position: absolute; left: 0; font-size: 13px; top: 1px; }
    </style>
</head>
<body>

<div id="editor-side">
    <h3 style="color:var(--hope-blue); margin-top:0;">🍓 HOPE 精致排版 v13.0</h3>
    <textarea id="editor" placeholder="在此粘贴...
示例：
01
被误解的“装”与数字世界的自我保护
【飞盘小组】
（这是一段带呼吸感的高亮文字）"></textarea>
    <div style="margin-top:15px; font-size:12px; color:#999; line-height:1.6;">
        🌟 <b>图三风格指南：</b><br>
        1. <b>数字+标题：</b> 01 下一行紧跟标题即可。<br>
        2. <b>高亮块：</b> 使用中文括号（）包裹长句子。<br>
        3. <b>胶囊：</b> 使用【】包裹短标题。
    </div>
</div>

<div id="preview-side">
    <div class="canvas" id="viewer"></div>
</div>

<script>
    const editor = document.getElementById('editor');
    const viewer = document.getElementById('viewer');

    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];

            // 1. H1 复合块识别
            if (/^\d{1,2}$/.test(line) && i + 1 < lines.length) {
                const titleText = lines[i+1];
                html += `
                <div class="h1-block">
                    <div class="h1-content">
                        <div class="h1-part">PART ${numToEng(line)}</div>
                        <div class="h1-title">${titleText}</div>
                    </div>
                    <div class="h1-number">${line.padStart(2, '0')}</div>
                </div>`;
                i++;
            }
            // 2. 胶囊识别
            else if (line.startsWith('【') && line.endsWith('】')) {
                html += `<div class="capsule">${line.replace(/[【】]/g, '')}</div>`;
            }
            // 3. 高亮块识别（图三风格）
            else if (line.startsWith('（') && line.endsWith('）')) {
                html += `<div class="highlight-box">${line.replace(/[（）]/g, '')}</div>`;
            }
            // 4. 二级标题识别
            else if (/^[一二三四五六七八九十]、/.test(line) || /^\d{1,2}\./.test(line)) {
                html += `<div class="h2-green">${line}</div>`;
            }
            // 5. 列表识别
            else if (line.startsWith('●') || line.startsWith('◆')) {
                html += `<div class="dot-item">${line.slice(1).trim()}</div>`;
            }
            // 6. 默认正文
            else {
                html += `<p>${line}</p>`;
            }
        }
        viewer.innerHTML = html || '<p style="color:#ccc; text-align:center; margin-top:150px;">等候草莓投喂...</p>';
    });

    function numToEng(n) {
        const words = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"];
        return words[parseInt(n)] || "SECTION";
    }
</script>
</body>
</html>
