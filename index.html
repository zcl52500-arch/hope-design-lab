<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 语义实验室 | 复杂文案适配版</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; --hope-gray: #F2F2F2; }
        body { margin: 0; display: flex; height: 100vh; font-family: "Optima", "PingFang SC", sans-serif; background: #f4f4f4; }
        
        /* 布局 */
        #editor-side { width: 35%; background: #fff; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #eee; border-radius: 8px; padding: 15px; font-size: 14px; line-height: 1.6; outline: none; background: #fafafa; }
        
        #preview-side { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .paper { width: 100%; max-width: 650px; background: white; padding: 60px 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); min-height: 100%; }

        /* --- 多级语义样式库 --- */
        /* Level 1: 大标背景数与 PART 标题 */
        .h1-num { font-size: 60px; color: var(--hope-gray); font-weight: 800; font-family: Arial; line-height: 1; margin-top: 30px; }
        .h1-title { color: var(--hope-blue); font-size: 20px; font-weight: bold; border-bottom: 3.5px solid var(--hope-blue); display: inline-block; padding-bottom: 5px; margin-bottom: 40px; }

        /* Level 2: 序列标题（如：五、更深层的需求）*/
        .h2-series { color: #333; font-size: 18px; font-weight: bold; margin: 40px 0 20px; border-left: 5px solid var(--hope-green); padding-left: 12px; }

        /* Level 3: 切片/项目标题 */
        .h3-slice { color: var(--hope-blue); font-size: 17px; font-weight: bold; margin: 30px 0 15px; display: flex; align-items: center; }
        .h3-slice::before { content: "● 🧩"; color: var(--hope-green); margin-right: 10px; }

        /* 特殊组件：胶囊与高亮 */
        .capsule { background: var(--hope-blue); color: white; display: inline-block; padding: 4px 18px; border-radius: 50px; font-weight: bold; margin: 20px 0 10px; font-size: 14px; }
        .highlight { background: var(--hope-yellow); padding: 15px 20px; border-radius: 4px; margin: 20px 0; font-weight: bold; line-height: 1.7; display: block; }

        /* 列表符号解析 */
        .list-dot { padding-left: 1.5em; position: relative; color: #444; margin-bottom: 12px; line-height: 1.6; }
        .list-dot::before { content: "●"; color: var(--hope-green); position: absolute; left: 0; font-size: 12px; top: 2px; }

        /* 微信标准正文 */
        p { text-indent: 2em; line-height: 1.9; text-align: justify; margin-bottom: 24px; color: #3F3F3F; font-size: 15.5px; }
        
        .editor-note { background: #F8F9FB; border-left: 4px solid var(--hope-blue); padding: 20px; font-size: 14px; color: #666; margin-bottom: 30px; }
    </style>
</head>
<body>

<div id="editor-side">
    <h3 style="color:var(--hope-blue);">🍓 HOPE 语义排版 v10.0</h3>
    <textarea id="editor" placeholder="在此粘贴《实践地图》全文...
系统将自动识别：
1. 纯数字/PART -> 一级标题
2. 一、二、三、或 12. -> 二级标题
3. 【】 -> 蓝色胶囊
4. （） -> 黄色高光
5. ● 或 ◆ -> 自动列表"></textarea>
</div>

<div id="preview-side">
    <div class="paper" id="viewer"></div>
</div>

<script>
    const editor = document.getElementById('editor');
    const viewer = document.getElementById('viewer');

    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        lines.forEach((line, i) => {
            // 1. 编者按识别
            if (line.includes('编者按')) {
                html += `<div class="editor-note">${line}</div>`;
            }
            // 2. 纯数字标号 (01, 02)
            else if (/^\d{1,2}$/.test(line)) {
                html += `<div class="h1-num">${line.padStart(2, '0')}</div>`;
            }
            // 3. 胶囊 【】
            else if (line.startsWith('【') && line.endsWith('】')) {
                html += `<div class="capsule">${line.replace(/[【】]/g, '')}</div>`;
            }
            // 4. 高亮 （）
            else if (line.startsWith('（') && line.endsWith('）')) {
                html += `<div class="highlight">${line.replace(/[（）]/g, '')}</div>`;
            }
            // 5. 二级标题 (汉字序号或数字点序号)
            else if (/^[一二三四五六七八九十]、/.test(line) || /^\d{1,2}\.\s/.test(line)) {
                html += `<div class="h2-series">${line}</div>`;
            }
            // 6. 一级标题 (PART 或 数字后的短行)
            else if (line.toUpperCase().includes('PART') || (i > 0 && /^\d{1,2}$/.test(lines[i-1]) && line.length < 20)) {
                html += `<div class="h1-title">${line}</div>`;
            }
            // 7. 列表识别 (● 或 ◆)
            else if (line.startsWith('●') || line.startsWith('◆')) {
                html += `<div class="list-dot">${line.replace(/[●◆]/g, '').trim()}</div>`;
            }
            // 8. 默认正文
            else {
                html += `<p>${line}</p>`;
            }
        });
        viewer.innerHTML = html || '<p style="color:#ccc; text-align:center; margin-top:150px;">等候草莓投喂文案...</p>';
    });
</script>
</body>
</html>
