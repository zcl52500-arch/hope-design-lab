<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab v33.1</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5f6f7;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:white;
padding:14px 24px;
border-bottom:1px solid #ddd;
display:flex;
justify-content:space-between;
align-items:center;
}

.main{
display:grid;
grid-template-columns:1fr 1fr;
flex:1;
}

textarea{
width:100%;
height:100%;
border:none;
padding:30px;
font-size:15px;
outline:none;
background:#fafafa;
resize:none;
}

.preview{
background:white;
overflow:auto;
padding:40px;
}

button{
background:#2E84C5;
color:white;
border:none;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.hint{
background:#f7f8fa;
padding:15px;
font-size:13px;
border-left:4px solid #76B92E;
margin-bottom:10px;
line-height:1.7;
}
</style>
</head>

<body>

<header>
<b>HOPE Design Lab v33.1</b>
<div>
<button onclick="copyHTML()">复制HTML</button>
<button onclick="clearText()" style="background:#888;margin-left:10px;">清空</button>
</div>
</header>

<div class="main">

<div style="display:flex;flex-direction:column">

<div class="hint">
# 标题<br>
## 小标题<br>
!! 金句<br>
> 引用<br>
【标签】<br>
--- 分割线<br>
- * + 列表<br>
1. 自动列表<br>
[图片] url<br>
[图注] 说明<br>
**粗体**
</div>

<textarea id="input" oninput="generate()"></textarea>

</div>

<div id="output" class="preview"></div>

</div>

<script>

const partMap={
1:"ONE",2:"TWO",3:"THREE",4:"FOUR",5:"FIVE",
6:"SIX",7:"SEVEN",8:"EIGHT",9:"NINE",10:"TEN"
};

function parseBold(t){
return t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
}

function generate(){

let text=document.getElementById("input").value
.replace(/\r/g,"")
.replace(/\n{3,}/g,"\n\n");

let lines=text.split("\n");

let html="";
let titles=[];
let count=0;

/* 扫描标题 */

lines.forEach(l=>{
if(l.startsWith("# ")){
count++;
titles.push({num:count,title:l.replace("# ","")});
}
});

/* 目录 */

if(titles.length>1){

html+=`<p style="font-weight:bold;margin:20px 0;">目录</p>`;

titles.forEach(t=>{
html+=`<p style="margin:4px 0;color:#2E84C5;">
${String(t.num).padStart(2,"0")} ${t.title}
</p>`;
});

html+=`<p style="margin:20px 0;"></p>`;
}

/* 正文生成 */

count=0;

lines.forEach(line=>{

line=line.trim();
if(!line) return;

line=parseBold(line);

/* 图片 */

if(line.startsWith("[图片]")){

let url=line.replace("[图片]","").trim();

html+=`<p style="text-align:center;margin:25px 0;">
<img src="${url}" style="max-width:100%;border-radius:6px;">
</p>`;
}

/* 图注 */

else if(line.startsWith("[图注]")){

let txt=line.replace("[图注]","").trim();

html+=`<p style="text-align:center;color:#888;font-size:13px;margin-top:-15px;margin-bottom:25px;">
${txt}
</p>`;
}

/* 一级标题 */

else if(line.startsWith("# ")){

count++;

let t=line.replace("# ","");

let num=String(count).padStart(2,"0");

let part=partMap[count] || "SECTION";

html+=`

<p style="margin:50px 0 30px 0;line-height:1.2;">

<span style="font-size:70px;font-weight:900;color:#E8F2DD;margin-right:10px;">
${num}
</span>

<span style="display:inline-block;margin-right:6px;
width:10px;height:10px;background:#FFD100;border-radius:50%;"></span>

<span style="font-size:13px;font-weight:bold;color:#FFD100;letter-spacing:2px;">
PART ${part}
</span>

<br>

<span style="font-size:26px;font-weight:bold;color:#2E84C5;">
${t}
</span>

<span style="color:#76B92E;font-size:28px;margin-left:8px;">
↘
</span>

</p>
`;

}

/* 二级标题 */

else if(line.startsWith("## ")){

let t=line.replace("## ","");

html+=`<p style="border-left:4px solid #76B92E;padding-left:10px;font-size:20px;font-weight:bold;margin:30px 0 15px;color:#2E84C5;">
${t}
</p>`;
}

/* 金句 */

else if(line.startsWith("!!")){

let t=line.replace("!!","").trim();

html+=`<p style="background:#FFD100;color:white;padding:12px 14px;border-radius:6px;line-height:1.9;margin:25px 0;">
${t}
</p>`;
}

/* 引用 */

else if(line.startsWith("> ")){

let t=line.replace("> ","");

html+=`<p style="border-left:4px solid #2E84C5;padding-left:12px;color:#555;margin:25px 0;line-height:1.9;">
${t}
</p>`;
}

/* 标签 */

else if(line.startsWith("【") && line.endsWith("】")){

let t=line.replace(/[【】]/g,"");

html+=`<p style="margin:20px 0;">
<span style="background:#2E84C5;color:white;padding:4px 14px;border-radius:20px;font-size:14px;">
${t}
</span>
</p>`;
}

/* 分割线 */

else if(line==="---"){

html+=`<p style="text-align:center;margin:40px 0;">
<span style="display:inline-block;width:8px;height:8px;background:#2E84C5;border-radius:50%;margin:0 5px;"></span>
<span style="display:inline-block;width:12px;height:12px;background:#FFD100;border-radius:50%;margin:0 5px;"></span>
<span style="display:inline-block;width:8px;height:8px;background:#76B92E;border-radius:50%;margin:0 5px;"></span>
</p>`;
}

/* 列表 */

else if(line.startsWith("- ")||line.startsWith("* ")||line.startsWith("+ ")){

let color="#2E84C5";
if(line.startsWith("* ")) color="#FFD100";
if(line.startsWith("+ ")) color="#76B92E";

let t=line.substring(2);

html+=`<p style="margin:8px 0;line-height:2;">
<span style="display:inline-block;width:8px;height:8px;background:${color};border-radius:50%;margin-right:8px;"></span>
${t}
</p>`;
}

/* 自动列表 */

else if(/^\d+\./.test(line)){

let t=line.replace(/^\d+\.\s*/,"");

html+=`<p style="margin:8px 0;line-height:2;">
<span style="display:inline-block;width:8px;height:8px;background:#2E84C5;border-radius:50%;margin-right:8px;"></span>
${t}
</p>`;
}

/* 正文 */

else{

html+=`<p style="line-height:2;font-size:16px;color:#333;margin:15px 0;text-align:justify;">
${line}
</p>`;
}

});

document.getElementById("output").innerHTML=html;
}

function copyHTML(){

let html=document.getElementById("output").innerHTML;

let blob=new Blob([html],{type:"text/html"});
let data=[new ClipboardItem({"text/html":blob})];

navigator.clipboard.write(data);

alert("复制成功");
}

function clearText(){
document.getElementById("input").value="";
document.getElementById("output").innerHTML="";
}

</script>

</body>
</html>
