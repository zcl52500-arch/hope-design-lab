<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · 视觉焊死最终版</title>

<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
    body { background-color:#F0F2F5; color:#1e293b; margin:0; padding:20px; font-family:'Inter', sans-serif; }
    .container { display:flex; gap:25px; flex-wrap:wrap; max-width: 1400px; margin: 0 auto; }
    textarea { width:45%; min-width:320px; min-height:700px; padding:20px; font-size:15px; line-height:1.7; border-radius:12px; border:1px solid #cbd5e1; outline:none; transition: all 0.3s; background: #fafafa; }
    textarea:focus { border-color: #2E84C5; background: #fff; box-shadow: 0 0 0 4px rgba(46,132,197,0.1); }
    .preview { width:50%; min-width:320px; background:white; padding:45px; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow:auto; }
    
    /* 仅用于编辑器的动画，不影响复制结果 */
    @keyframes float {0%{transform:translateY(0px) rotate(-1deg);}50%{transform:translateY(-6px) rotate(0.5deg);}100%{transform:translateY(0px) rotate(-1deg);}}
    .animate-float{animation:float 4s ease-in-out infinite;}
    @media(max-width:1000px){.container{flex-direction:column;}.preview,textarea{width:100%;}}
</style>
</head>

<body>
<div class="max-w-7xl mx-auto mb-8 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-slate-800 animate-float flex items-center">
        <span style="font-size:30px; margin-right:10px;">🍓</span> 
        HOPE Design Lab 
        <span class="ml-3 px-3 py-1 bg-yellow-400 text-white text-xs rounded-full shadow-sm">v7.2 物理焊死版</span>
    </h1>
    <div class="flex gap-3">
        <button onclick="generate()" class="bg-slate-800 hover:bg-black text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg active:scale-95">生成预览</button>
        <button onclick="copyHTML()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg active:scale-95">复制 HTML</button>
        <button onclick="uploadImage()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-sm">上传图片</button>
    </div>
</div>

<div class="max-w-7xl mx-auto mb-4 flex items-center justify-between text-slate-400 text-xs px-2">
    <div id="meta">字数 0 · 预计阅读 0 分钟</div>
    <div class="flex gap-4">
        <span>## 数字标题 触发悬浮</span>
        <span>> 引用 触发感性块</span>
        <span>【】触发胶囊</span>
    </div>
</div>

<div class="container">
    <textarea id="input" oninput="generate()" placeholder="在此贴入文案...
支持：
# 一级标题
## 01 分段切片
> 引用或感性段落
【蓝色胶囊标题】
--- 分割线"></textarea>
    
    <div id="output" class="preview"></div>
</div>

<input type="file" id="fileInput" style="display:none" accept="image/*">

<script>
const inputEl=document.getElementById("input");
const outputEl=document.getElementById("output");
const metaEl=document.getElementById("meta");
const fileInput=document.getElementById("fileInput");

function numToEng(n) {
    const words = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"];
    return words[parseInt(n)] || "CHAPTER";
}

function uploadImage(){ fileInput.click(); }
fileInput.addEventListener("change",(e)=>{
    const file=e.target.files[0];
    if(file){
        const reader=new FileReader();
        reader.onload=function(evt){
            inputEl.value += `\n![${file.name}](${evt.target.result})\n`;
            generate();
        }
        reader.readAsDataURL(file);
    }
});

function generate(){
    const text=inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
    const lines=text.split("\n");
    let html="", wordCount=0;

    lines.forEach(line=>{
        line=line.trim();
        if(line==="") return;
        wordCount+=line.length;

        // 1. HOPE 一级标题 (居中/蓝色/快乐体)
        if(line.startsWith("# ")){
            html += `<section style="text-align:center; margin: 45px 0 35px;"><h1 style="font-size:28px; font-weight:bold; color:#2E84C5; line-height:1.4; font-family:'ZCOOL KuaiLe', cursive; border:none; margin:0;">${line.replace("# ","")}</h1></section>`;
        }
        // 2. HOPE 二级标题 (右漂浮大数字 + 黄色圆点补丁)
        else if(line.startsWith("## ")){
            let content = line.replace("## ","");
            let numMatch = content.match(/\d+/);
            let num = numMatch ? numMatch[0] : "01";
            let cleanTitle = content.replace(num, "").replace(/PART/i, "").trim();
            
            html += `
            <section style="margin: 65px 0 50px; position: relative; overflow: visible;">
                <section style="text-align: right; height: 0px; margin-bottom: -55px; pointer-events: none;">
                    <span style="font-size: 110px; color: #F7F7F7; font-family: Arial, sans-serif; font-weight: 900; line-height: 1; display: inline-block;">${num.padStart(2, '0')}</span>
                </section>
                <section style="position: relative; z-index: 2;">
                    <section style="margin-bottom: 15px; display: flex; align-items: center;">
                        <section style="width: 12px; height: 12px; background-color: #FFD100; border-radius: 50%; margin-right: 12px; flex-shrink: 0;"></section>
                        <section style="color: #FFD100; font-size: 15px; font-weight: bold; letter-spacing: 4px; font-family: Arial;">PART ${numToEng(num)}</section>
                    </section>
                    <section style="color: #2E84C5; font-size: 28px; font-weight: bold; line-height: 1.3; max-width: 85%;">${cleanTitle}</section>
                    <section style="color: #FFD100; font-size: 40px; font-weight: 900; margin-top: 15px; line-height: 1;">↘</section>
                </section>
            </section>`;
        }
        // 3. 蓝色胶囊标题 (增加宽度感)
        else if(line.startsWith("【") && line.endsWith("】")){
            html += `<section style="margin: 35px 0 20px;"><span style="display: inline-block; background-color: #2E84C5; color: #ffffff; padding: 7px 28px; border-radius: 50px; font-size: 16px; font-weight: bold; line-height: 1.2; box-shadow: 0 2px 8px rgba(46,132,197,0.2);">${line.replace(/[【】]/g, '')}</span></section>`;
        }
        // 4. 感性引用段落 (淡暖米色 + 黄粗线)
        else if(line.startsWith("> ")){
            html += `<section style="margin: 40px 0; background-color: #FCFAF2; border-left: 6px solid #FFD100; padding: 30px 35px; line-height: 2.1; color: #444; font-size: 17px; border-radius: 0 8px 8px 0; text-align: justify; font-family: 'Ma Shan Zheng', cursive;">${line.replace("> ","")}</section>`;
        }
        // 5. 分割线 (HOPE 黄虚线)
        else if(line==="---"){
            html += `<section style="margin: 50px auto; width: 40%; border-top: 2px dashed #FFD100; opacity: 0.6;"></section>`;
        }
        // 6. 图片处理
        else if(line.startsWith("![") && line.includes("](")){
            let match=line.match(/!\[([^\]]*)\]\(([^)]+)\)/);
            if(match){ 
                html += `<section style="margin: 30px 0; text-align: center;"><img src="${match[2]}" style="max-width:100%; border-radius:12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); border: 1px solid #eee;"></section>`; 
            }
        }
        // 7. 正文段落 (空气感核心：2.2倍行距 + 两端对齐)
        else {
            html += `<p style="text-indent: 2.1em; line-height: 2.2; margin-bottom: 28px; color: #333; font-size: 16.5px; text-align: justify; letter-spacing: 0.6px;">${line}</p>`;
        }
    });

    outputEl.innerHTML = html || '<p style="color:#cbd5e1; text-align:center; margin-top:280px; font-size:14px;">🍓 贴入文案，即刻开启 HOPE 像素级排版...</p>';
    metaEl.innerText = `字数 ${wordCount} · 预计阅读 ${Math.ceil(wordCount/400)} 分钟`;
}

function copyHTML(){
    const range = document.createRange();
    range.selectNode(outputEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    try {
        document.execCommand('copy');
        alert("🍓 HOPE 视觉元素已物理焊死！去公众号后台粘贴，保证不走样。");
    } catch (err) {
        alert("浏览器限制了自动复制，请手动全选预览区内容。");
    }
}

// 页面加载自动运行一次
window.onload = generate;
</script>
</body>
</html>
