<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 学堂 | 语义排版系统</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; }
        body { margin: 0; display: flex; height: 100vh; font-family: "Optima", "PingFang SC", sans-serif; background: #f4f7f9; color: #333; }
        
        /* 界面布局 */
        #editor-side { width: 35%; background: #fff; border-right: 1px solid #d1d1d1; display: flex; flex-direction: column; padding: 25px; }
        textarea { flex: 1; border: 1px solid #e2e2e2; border-radius: 5px; padding: 20px; font-size: 14px; line-height: 1.6; outline: none; resize: none; background: #fdfdfd; }
        
        #preview-side { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .paper { width: 100%; max-width: 600px; background: white; padding: 65px 55px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); min-height: 100%; box-sizing: border-box; }

        /* --- 语义化样式库 --- */
        /* H1: 大背景数字 */
        .h1-num { font-size: 68px; color: #F2F2F2; font-weight: 900; font-family: Arial; line-height: 1; margin-bottom: -12px; letter-spacing: -2px; }
        /* H1-Sub: 蓝色主标题 */
        .h1-title { color: var(--hope-blue); font-size: 21px; font-weight: bold; border-bottom: 3.5px solid var(--hope-blue); display: inline-block; padding-bottom: 6px; margin-bottom: 45px; letter-spacing: 1.5px; }
        
        /* H2: 绿色切片标题 */
        .h2-slice { color: var(--hope-blue); font-size: 18px; font-weight: bold; margin: 35px 0 22px; display: flex; align-items: center; }
        .h2-slice::before { content: "● 🧩"; color: var(--hope-green); margin-right: 10px; font-size: 18px; }
        
        /* H3: 蓝色竖线副标题 */
        .h3-sidebar { border-left: 5px solid var(--hope-blue); padding-left: 16px; margin: 28px 0 18px; font-weight: bold; color: #222; font-size: 16.5px; }
        
        /* Decor: 引导箭头 */
        .decor-arrow { color: var(--hope-yellow); font-size: 35px; margin: 15px 0 25px 1.8em; line-height: 1; }
        
        /* Body: 正文 */
        p { text-indent: 2.1em; line-height: 1.85; text-align: justify; margin-bottom: 24px; font-size: 15.5px; color: #444; }
    </style>
</head>
<body>

<div id="editor-side">
    <h2 style="color:var(--hope-blue); font-size:18px; margin:0 0 15px 0;">🍓 排版实验室 v6.0</h2>
    <textarea id="source" placeholder="直接粘贴全文...
系统逻辑：
1. 极短行(数字) -> 标号
2. 紧随其后的短行 -> 蓝色主标题
3. 包含关键符号或中等长度 -> 切片
4. 带‘关于’或‘——’ -> 竖线副标题"></textarea>
</div>

<div id="preview-side">
    <div class="paper" id="canvas">
        <p style="color:#ccc; text-align:center; margin-top:150px;">等待解析内容...</p>
    </div>
</div>

<script>
    const source = document.getElementById('source');
    const canvas = document.getElementById('canvas');

    source.addEventListener('input', () => {
        const raw = source.value;
        if (!raw.trim()) { canvas.innerHTML = ''; return; }

        const lines = raw.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        lines.forEach((line, i) => {
            const isShort = line.length < 18;
            const hasNum = /^\d+$/.test(line);
            
            // 逻辑 A：如果是纯数字行
            if (hasNum && isShort) {
                html += `<div class="h1-num">${line.padStart(2, '0')}</div>`;
            }
            // 逻辑 B：主标题（紧跟数字后，或全英文短句）
            else if (isShort && ((i > 0 && /^\d+$/.test(lines[i-1])) || /^[A-Z\s]+$/.test(line))) {
                html += `<div class="h1-title">${line.toUpperCase()}</div>`;
            }
            // 逻辑 C：切片标题（中等长度，非段落，包含切片字样或特定结构）
            else if (isShort && (line.includes('切片') || (line.includes('：') && !line.includes('关于')))) {
                html += `<div class="h2-slice">${line.replace(/[●🧩]/g, '')}</div>`;
            }
            // 逻辑 D：副标题（带关于或横线）
            else if (line.includes('关于') || line.includes('——') || line.includes('┃')) {
                html += `<div class="h3-sidebar">${line.replace(/[—|┃]/g, '').trim()}</div>`;
            }
            // 逻辑 E：装饰箭头
            else if (line.includes('↘')) {
                html += `<div class="decor-arrow">↘</div>`;
            }
            // 逻辑 F：正文
            else {
                html += `<p>${line}</p>`;
            }
        });

        canvas.innerHTML = html;
    });
</script>
</body>
</html>
