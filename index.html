<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPE Design Lab - 稳健版</title>
    <!-- 引入最基础、最稳定的库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #F8FAFB; }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 900; color: #2589D0; margin-top: 2rem; margin-bottom: 1rem; }
        .markdown-body p { margin-bottom: 1.2rem; line-height: 1.8; color: #334155; }
        .markdown-body blockquote { border-left: 4px solid #2589D0; padding-left: 1rem; color: #64748b; font-style: italic; margin: 1.5rem 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ⚠️ 请在此处粘贴您的 API KEY
        const API_KEY = "AIzaSyC3SKI49gYQ0WZZzNJtaf5DyFkaN0OAs5s";

        function App() {
            const [tab, setTab] = useState('layout');
            const [text, setText] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState('');

            const handleRun = async () => {
                if (!text || !API_KEY || API_KEY.includes("粘贴")) {
                    alert("请先输入内容并确保已配置 API Key");
                    return;
                }
                
                setLoading(true);
                try {
                    // 直接使用 fetch 调用 API，不依赖 SDK
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `你现在是 HOPE 学堂的排版专家。请将以下内容转换为符合 HOPE 学院风格的 HTML 排版（使用内联样式，保留所有文字，增加视觉层级感）：\n\n${text}`
                                }]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const aiText = data.candidates[0].content.parts[0].text;
                    setResult(aiText);
                } catch (error) {
                    console.error(error);
                    alert("AI 调用出错：" + error.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b p-6 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-2 h-8 bg-blue-500 rounded-full"></div>
                            <h1 className="text-xl font-black">HOPE <span className="text-blue-500">Design Lab</span></h1>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setTab('layout')} className={`px-6 py-2 rounded-lg text-xs font-bold transition-all ${tab === 'layout' ? 'bg-white shadow-sm text-blue-500' : 'text-slate-500'}`}>排版</button>
                            <button onClick={() => setTab('poster')} className={`px-6 py-2 rounded-lg text-xs font-bold transition-all ${tab === 'poster' ? 'bg-white shadow-sm text-blue-500' : 'text-slate-500'}`}>海报</button>
                        </div>
                    </nav>

                    <main className="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            {/* 输入区 */}
                            <div className="bg-white rounded-[2.5rem] p-8 md:p-10 shadow-xl border border-slate-100">
                                <h2 className="text-2xl font-black mb-6 tracking-tight">输入原文</h2>
                                <textarea 
                                    className="w-full h-96 p-6 rounded-[1.5rem] bg-slate-50 border-none outline-none focus:ring-4 focus:ring-blue-50 transition-all text-base leading-relaxed mb-6"
                                    placeholder="在此粘贴您的文章内容..."
                                    value={text}
                                    onChange={(e) => setText(e.target.value)}
                                />
                                <button 
                                    onClick={handleRun}
                                    disabled={loading}
                                    className="w-full py-5 bg-slate-900 text-white rounded-[1.5rem] font-black tracking-widest hover:bg-blue-600 transition-all shadow-lg disabled:opacity-50"
                                >
                                    {loading ? 'AI 正在排版中...' : '开始智能排版'}
                                </button>
                            </div>

                            {/* 预览区 */}
                            <div className="bg-white rounded-[2.5rem] p-8 md:p-10 shadow-2xl border border-slate-100 min-h-[500px]">
                                <h2 className="text-2xl font-black mb-6 tracking-tight text-slate-400">预览效果</h2>
                                {result ? (
                                    <div className="markdown-body" dangerouslySetInnerHTML={{ __html: result }} />
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-200 py-20">
                                        <i className="fas fa-wand-magic-sparkles text-6xl mb-4"></i>
                                        <p className="font-bold uppercase tracking-widest text-sm">等待生成预览</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
