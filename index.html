<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · 微信兼容版</title>
<style>
body {
    background-color:#F0F2F5; 
    padding:20px; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    color:#1e293b;
}
.container {
    display:flex;
    gap:20px;
    max-width:1200px;
    margin:0 auto;
    flex-wrap:wrap;
}
textarea {
    width:45%;
    min-width:300px;
    min-height:850px;
    padding:20px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    font-size:15px;
    line-height:1.7;
    resize:none;
}
.preview {
    width:55%;
    min-width:300px;
    background:white;
    padding:30px 35px;
    border-radius:12px;
    overflow:auto;
    min-height:850px;
}
button {
    background:#2E84C5;
    color:#fff;
    padding:10px 25px;
    border-radius:20px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
h1 span {
    font-size:12px;
    background:#76B92E;
    color:#fff;
    padding:2px 8px;
    border-radius:10px;
}
@media(max-width:1000px){
    .container{flex-direction:column;}
    textarea,.preview{width:100%;}
}
</style>
</head>
<body>

<div style="max-width:1200px; margin:0 auto 20px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>🍓 HOPE Design Lab <span>v7.9 微信兼容版</span></h1>
        <button onclick="copyHTML()">一键复制</button>
    </div>
</div>

<div class="container">
    <textarea id="input" oninput="generate()" placeholder="在此粘贴文案...
支持：
# 一级标题
## 二级标题
> 引用/编者按
---
正文段落
"></textarea>
    <div id="output" class="preview"></div>
</div>

<script>
const inputEl=document.getElementById("input");
const outputEl=document.getElementById("output");

function generate(){
    const text=inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
    const lines=text.split("\n");
    let html="", wordCount=0;

    lines.forEach(line=>{
        line=line.trim();
        if(line==="") return;
        wordCount+=line.length;

        // 一级标题
        if(line.startsWith("# ")){
            html += `<p style="text-align:center; font-size:28px; font-weight:bold; color:#2E84C5; margin:40px 0 25px;">${line.replace("# ","")}</p>`;
        }
        // 二级标题
        else if(line.startsWith("## ")){
            html += `<p style="border-left:4px solid #76B92E; padding-left:10px; font-size:20px; font-weight:bold; color:#2E84C5; margin:30px 0 20px;">${line.replace("## ","")}</p>`;
        }
        // 引用块
        else if(line.startsWith("> ")){
            let content = line.replace("> ","");
            let isNote = content.includes("编者按");
            let bg = isNote ? "#F2F7FB" : "#FCFAF2";
            let color = isNote ? "#2E84C5" : "#FFD100";
            html += `<p style="background:${bg}; border-left:4px solid ${color}; padding:12px 10px; line-height:1.8; color:#444; font-size:16px; text-align:justify; margin:25px 0;">${content}</p>`;
        }
        // 分割线
        else if(line==="---"){
            html += `<p style="text-align:center; margin:30px 0; color:#76B92E; font-weight:bold;">•••</p>`;
        }
        // 正文
        else {
            html += `<p style="text-indent:2em; line-height:1.8; font-size:16px; color:#333; text-align:justify; margin-bottom:20px;">${line}</p>`;
        }
    });

    outputEl.innerHTML = html || '<p style="color:#cbd5e1; text-align:center; margin-top:200px;">🍓 期待你的文章内容...</p>';
}

function copyHTML(){
    const range = document.createRange();
    range.selectNode(outputEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    try {
        document.execCommand('copy');
        alert("🍓 HOPE 专属格式已打包！直接去公众号后台粘贴即可。");
    } catch (err) {
        alert("复制失败，请手动选择预览区内容复制");
    }
}

window.onload = generate;
</script>

</body>
</html>
