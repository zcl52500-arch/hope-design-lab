<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 像素级排版系统 v12.0</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; --hope-gray: #F5F5F5; }
        body { margin: 0; display: flex; height: 100vh; font-family: -apple-system, "PingFang SC", sans-serif; background: #eef1f4; }
        
        #editor-side { width: 32%; background: #fff; border-right: 1px solid #ddd; padding: 25px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #eee; border-radius: 8px; padding: 15px; font-size: 14px; line-height: 1.6; outline: none; background: #fafafa; }
        
        #preview-side { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .canvas { width: 100%; max-width: 620px; background: white; padding: 70px 55px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); min-height: 100%; box-sizing: border-box; }

        /* --- 重构：H1 复合视觉块 --- */
        .h1-composite-container { display: flex; justify-content: space-between; align-items: flex-end; margin: 50px 0 40px; border-bottom: 4px solid var(--hope-blue); padding-bottom: 15px; }
        .h1-left { flex: 1; }
        .part-label { color: #999; font-size: 14px; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; font-family: Arial; }
        .h1-text { color: var(--hope-blue); font-size: 24px; font-weight: bold; line-height: 1.3; }
        .h1-right-num { font-size: 80px; color: #F2F2F2; font-weight: 900; font-family: Arial; line-height: 0.8; margin-left: 20px; }
        
        /* 胶囊标题：【文字】 */
        .capsule-pill { background: var(--hope-blue); color: white; display: inline-block; padding: 6px 28px; border-radius: 50px; font-weight: bold; font-size: 16px; margin: 30px 0 15px; }

        /* 黄色高亮块：(文字) —— 增大面积与留白 */
        .yellow-highlight-section { background: var(--hope-yellow); color: #222; padding: 30px 35px; border-radius: 5px; margin: 35px 0; font-weight: bold; font-size: 17.5px; line-height: 1.8; text-align: justify; position: relative; }
        .yellow-highlight-section::after { content: "↘"; position: absolute; bottom: 10px; right: 20px; color: rgba(0,0,0,0.1); font-size: 40px; }

        /* 绿色二级：一、二、三 */
        .h2-green-line { border-left: 6px solid var(--hope-green); padding-left: 18px; font-size: 19px; font-weight: bold; color: #333; margin: 45px 0 20px; }

        /* 微信标准正文 */
        p { text-indent: 2em; line-height: 1.95; text-align: justify; margin-bottom: 25px; color: #3F3F3F; font-size: 16px; }

        /* 列表项 */
        .list-dot { padding-left: 1.8em; position: relative; margin-bottom: 12px; color: #444; line-height: 1.7; }
        .list-dot::before { content: "●"; color: var(--hope-green); position: absolute; left: 0; font-size: 14px; }
    </style>
</head>
<body>

<div id="editor-side">
    <h3 style="color:var(--hope-blue); margin-top:0;">🍓 HOPE 深度复刻系统 v12.0</h3>
    <textarea id="editor" placeholder="输入说明：
1. 01 [回车] 标题内容 -> 触发 H1 复合结构
2. 【胶囊内容】 -> 蓝色圆角
3. （高亮段落） -> 大面积黄色块
4. ● 列表内容 -> 绿色点状列表"></textarea>
</div>

<div id="preview-side">
    <div class="canvas" id="viewer"></div>
</div>

<script>
    const editor = document.getElementById('editor');
    const viewer = document.getElementById('viewer');

    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];

            // A. 核心：H1 复合构图识别 (数字 + 下一行的标题)
            if (/^\d{1,2}$/.test(line) && i + 1 < lines.length) {
                const nextLine = lines[i+1];
                html += `
                <div class="h1-composite-container">
                    <div class="h1-left">
                        <div class="part-label">PART ${numberToEnglish(line)}</div>
                        <div class="h1-text">${nextLine}</div>
                    </div>
                    <div class="h1-right-num">${line.padStart(2, '0')}</div>
                </div>`;
                i++; // 跳过下一行，因为它已经被作为标题处理了
            }
            // B. 胶囊识别
            else if (line.startsWith('【') && line.endsWith('】')) {
                html += `<div class="capsule-pill">${line.replace(/[【】]/g, '')}</div>`;
            }
            // C. 黄色高亮块识别
            else if (line.startsWith('（') && line.endsWith('）')) {
                html += `<div class="yellow-highlight-section">${line.replace(/[（）]/g, '')}</div>`;
            }
            // D. 二级标题识别
            else if (/^[一二三四五六七八九十]、/.test(line) || /^\d{1,2}\./.test(line)) {
                html += `<div class="h2-green-line">${line}</div>`;
            }
            // E. 列表识别
            else if (line.startsWith('●') || line.startsWith('◆')) {
                html += `<div class="list-dot">${line.slice(1).trim()}</div>`;
            }
            // F. 正文
            else {
                html += `<p>${line}</p>`;
            }
        }
        viewer.innerHTML = html || '<p style="color:#ccc; text-align:center; margin-top:150px;">等待草莓投喂...</p>';
    });

    function numberToEnglish(n) {
        const map = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"];
        return map[parseInt(n)] || "CHAPTER";
    }
</script>
</body>
</html>
