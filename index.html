<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HOPE 学堂 | 像素级排版实验室 v8.0</title>
    <style>
        :root { --hope-blue: #2E84C5; --hope-green: #7AB642; --hope-yellow: #FFD100; }
        body { margin: 0; display: flex; height: 100vh; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        
        /* 布局 */
        #left-panel { width: 35%; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        textarea { flex: 1; border: 1px solid #eee; border-radius: 8px; padding: 15px; font-size: 14px; line-height: 1.6; outline: none; background: #fafafa; }
        
        #right-panel { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .canvas { width: 100%; max-width: 620px; background: white; padding: 60px 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); min-height: 100%; }

        /* --- 修正后的 HOPE 核心样式 --- */
        /* 1. 数字样式：任何数字行都会变大 */
        .big-num { font-size: 64px; color: #F0F0F0; font-weight: 900; font-family: Arial; line-height: 1; margin-bottom: -15px; }
        
        /* 2. 蓝色主标题：紧跟在数字后面的短行 */
        .main-title { color: var(--hope-blue); font-size: 21px; font-weight: bold; border-bottom: 3.5px solid var(--hope-blue); display: inline-block; padding-bottom: 5px; margin-bottom: 40px; text-transform: uppercase; }
        
        /* 3. 胶囊样式：匹配 【内容】 或 [内容] */
        .capsule { background: var(--hope-blue); color: white; display: inline-block; padding: 5px 20px; border-radius: 50px; font-weight: bold; margin: 25px 0 15px; font-size: 15px; }
        
        /* 4. 高光/橙黄背景：匹配 （内容） 或 (内容) */
        .highlight { background: var(--hope-yellow); color: #333; padding: 15px 25px; border-radius: 4px; margin: 25px 0; font-weight: bold; line-height: 1.6; display: block; }

        /* 5. 切片样式：匹配 ● 🧩 */
        .slice { color: var(--hope-blue); font-size: 18px; font-weight: bold; margin: 35px 0 20px; display: flex; align-items: center; }
        .slice::before { content: "● 🧩"; color: var(--hope-green); margin-right: 10px; }

        /* 6. 蓝色竖线：匹配 —— 或 | */
        .sidebar { border-left: 5px solid var(--hope-blue); padding-left: 15px; margin: 30px 0 15px; font-weight: bold; font-size: 16.5px; color: #222; }

        p { text-indent: 2em; line-height: 1.9; text-align: justify; margin-bottom: 24px; color: #444; font-size: 15.5px; }
    </style>
</head>
<body>

<div id="left-panel">
    <h3 style="color:var(--hope-blue);">🍓 排版实验室 v8.0</h3>
    <textarea id="editor" placeholder="在这里输入内容...
示例：
03
PART THREE
【这是一个胶囊】
(这是一个高光背景)
"></textarea>
    <div style="font-size: 12px; color: #999; margin-top: 10px; line-height: 1.5;">
        ✅ <b>数字自动识别：</b> 只要一行只有数字，它就会变大。<br>
        ✅ <b>符号不分中英文：</b> 使用【】或 [] 都能出胶囊。<br>
        ✅ <b>标题智能识别：</b> 数字下方的短行自动变蓝标题。
    </div>
</div>

<div id="right-panel">
    <div class="canvas" id="viewer"></div>
</div>

<script>
    const editor = document.getElementById('editor');
    const viewer = document.getElementById('viewer');

    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        let html = '';

        lines.forEach((line, i) => {
            // 1. 数字识别 (任意 1-3 位数字)
            if (/^\d{1,3}$/.test(line)) {
                html += `<div class="big-num">${line.padStart(2, '0')}</div>`;
            }
            // 2. 胶囊识别 (支持中英文括号)
            else if ((line.startsWith('[') && line.endsWith(']')) || (line.startsWith('【') && line.endsWith('】'))) {
                html += `<div class="capsule">${line.replace(/[\[\]【】]/g, '')}</div>`;
            }
            // 3. 高光识别 (支持中英文括号)
            else if ((line.startsWith('(') && line.endsWith(')')) || (line.startsWith('（') && line.endsWith('）'))) {
                html += `<div class="highlight">${line.replace(/[\(\)（）]/g, '')}</div>`;
            }
            // 4. 蓝线主标题 (数字后的第一行短句)
            else if (line.length < 20 && i > 0 && /^\d{1,3}$/.test(lines[i-1])) {
                html += `<div class="main-title">${line}</div>`;
            }
            // 5. 切片识别
            else if (line.includes('切片')) {
                html += `<div class="slice">${line.replace(/[●🧩]/g, '')}</div>`;
            }
            // 6. 竖线识别
            else if (line.startsWith('——') || line.startsWith('|')) {
                html += `<div class="sidebar">${line.replace(/[—|]/g, '').trim()}</div>`;
            }
            // 7. 正文
            else {
                html += `<p>${line}</p>`;
            }
        });
        viewer.innerHTML = html || '<p style="color:#ccc; text-align:center; margin-top:100px;">等待输入内容...</p>';
    });
</script>
</body>
</html>
