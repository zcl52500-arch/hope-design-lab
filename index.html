<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab · v28.2 指令提示版</title>
<style>
* { box-sizing:border-box; }
body { margin:0; font-family:sans-serif; background:#F4F6F9; display:flex; flex-direction:column; height:100vh; }
header { background:white; padding:15px 30px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center; }
.main { display:grid; grid-template-columns:1fr 1fr; flex:1; overflow:hidden; }
textarea { width:100%; height:100%; padding:30px; border:none; outline:none; font-size:15px; background:#fafafa; resize:none; }
.preview { background:white; overflow-y:auto; padding:40px; }
button { background:#2E84C5; color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-weight:bold; }

/* 指令提示区 */
.hint { background:#F8F9FA; padding:15px 20px; margin-bottom:10px; border-radius:6px; border-left:4px solid #76B92E; font-size:13px; color:#666; }
.hint code { background:#eee; padding:2px 5px; border-radius:3px; color:#2E84C5; font-weight:bold; font-family:monospace; }

/* 核心样式 */
h1, h2, p, section { margin:0; padding:0; }

/* 金句 */
.gold-quote { background-color:#FFD100; color:#fff; padding:20px; border-radius:8px; line-height:2.1; font-size:16px; text-align:justify; margin:30px 0; }

/* 普通引用 */
.quote-block { background-color:#F2F7FB; border-left:6px solid #2E84C5; padding:25px 30px; line-height:2.1; font-size:16px; color:#444; text-align:justify; border-radius:0 8px 8px 0; margin:35px 0; }

/* 蓝色胶囊 */
.blue-tag { display:inline-block; background-color:#2E84C5; color:#fff; padding:5px 25px; border-radius:50px; font-size:14px; font-weight:bold; letter-spacing:1px; margin:20px 0; text-align:center; }

/* 一级标题数字 & part */
.section-number { font-size:85px; font-weight:900; color:#EBF4E2; font-family:Arial,sans-serif; line-height:1; letter-spacing:-4px; vertical-align:bottom; display:inline-block; }
.section-part { font-size:14px; font-weight:bold; color:#FFD100; letter-spacing:2px; margin-left:8px; vertical-align:middle; font-family:Arial,sans-serif; display:inline-block; }
.section-arrow { color:#76B92E; font-size:40px; font-weight:900; margin-top:15px; margin-left:10px; line-height:1; }

/* 二级标题 */
.h2-line { border-left:5px solid #76B92E; padding-left:15px; line-height:1.4; font-size:21px; font-weight:bold; color:#2E84C5; font-family:sans-serif; margin:40px 0 20px; }
</style>
</head>
<body>

<header>
<h1 style="margin:0; font-size:18px; color:#333;">🍓 HOPE Design Lab <span style="color:#76B92E;">v28.2 (指令提示版)</span></h1>
<button onclick="copyHTML()">一键复制 HTML 全文</button>
</header>

<div class="main">
<div style="display:flex; flex-direction:column;">
  <div class="hint">
    💡 <b>语法提示：</b><br>
    <code># 01 一级标题</code> — 大数字 + PART + 蓝色标题 + 绿色箭头<br>
    <code>## 二级标题</code> — 左绿竖线 + 蓝色字体<br>
    <code>【标签】</code> — 蓝色圆角胶囊<br>
    <code>> 引用</code> — 浅蓝灰块 + 蓝条<br>
    <code>!! 金句</code> — 金黄色块<br>
    <code>---</code> — 三色分割线
  </div>
  <textarea id="input" oninput="generate()" placeholder="粘贴全文文案，如：# 01 标题内容..."></textarea>
</div>
<div id="output" class="preview"></div>
</div>

<script>
const inputEl=document.getElementById("input");
const outputEl=document.getElementById("output");
const engMap={"01":"ONE","02":"TWO","03":"THREE","04":"FOUR","05":"FIVE","06":"SIX","07":"SEVEN","08":"EIGHT","09":"NINE","10":"TEN"};

function generate(){
  const text=inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
  const lines=text.split("\n");
  let html="";

  lines.forEach(line=>{
    line=line.trim();
    if(!line) return;

    // 金句 !!
    if(line.startsWith("!!")){
      let content=line.replace(/^!!/,"").trim();
      html+=`<section class="gold-quote">${content}</section>`;
    }

    // 一级标题 #
    else if(line.startsWith("# ")){
      let raw=line.replace("# ","");
      let numStr=(raw.match(/^\d+/)||["01"])[0];
      let titleStr=raw.replace(/^\d+/,"").trim();
      let engStr=engMap[numStr]||"SECTION";
      html+=`
      <section style="margin:50px 0 40px; padding:0; clear:both; text-align:left;">
        <section style="display:inline-block; vertical-align:bottom; white-space:nowrap !important; margin:0;">
          <span class="section-number">${numStr}</span>
        </section>
        <section style="display:inline-block; vertical-align:bottom; margin-left:15px; padding-bottom:10px; max-width:70%;">
          <section style="margin-bottom:8px; line-height:1;">
            <span style="display:inline-block; width:12px; height:12px; background-color:#FFD100; border-radius:50%; vertical-align:middle;"></span>
            <span class="section-part">PART ${engStr}</span>
          </section>
          <section style="font-size:28px; font-weight:bold; color:#2E84C5; line-height:1.3; font-family:sans-serif;">${titleStr}</section>
        </section>
        <section class="section-arrow">↘</section>
      </section>`;
    }

    // 二级标题 ##
    else if(line.startsWith("## ")){
      html+=`<section class="h2-line">${line.replace("## ","")}</section>`;
    }

    // 普通引用 >
    else if(line.startsWith("> ")){
      let content=line.replace("> ","");
      html+=`<section class="quote-block">${content}</section>`;
    }

    // 蓝色胶囊 【】
    else if(line.startsWith("【") && line.endsWith("】")){
      html+=`<div class="blue-tag">${line.replace(/[【】]/g,'')}</div>`;
    }

    // 三色分割线 ---
    else if(line==="---"){
      html+=`<section style="text-align:center; margin:60px 0;">
        <span style="display:inline-block; width:8px; height:8px; background-color:#2E84C5; border-radius:50%; margin:0 8px;"></span>
        <span style="display:inline-block; width:12px; height:12px; background-color:#FFD100; border-radius:50%; margin:0 8px;"></span>
        <span style="display:inline-block; width:8px; height:8px; background-color:#76B92E; border-radius:50%; margin:0 8px;"></span>
      </section>`;
    }

    // 正文
    else{
      html+=`<p style="text-indent:2.1em; line-height:2.2; font-size:17px; color:#333; margin-bottom:28px; text-align:justify; letter-spacing:0.5px; font-family:sans-serif;">${line}</p>`;
    }
  });

  outputEl.innerHTML=html;
}

function copyHTML(){
  const range=document.createRange();
  range.selectNode(outputEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand('copy');
  alert("🍓 HOPE v28.2 复制成功！\n金句/引用/一级二级标题/胶囊 样式均已锁定");
}

window.onload=generate;
</script>
</body>
</html>
