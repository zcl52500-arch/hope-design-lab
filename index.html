<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Design Lab v7 · 最终版公众号排版器</title>

<!-- 字体引入 -->
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        playful: ['ZCOOL KuaiLe', 'cursive'],
        handwritten: ['Ma Shan Zheng', 'cursive']
      }
    }
  }
}
</script>

<style>
body { background-color:#F8FAFC; color:#1e293b; margin:0; padding:20px; }
.container{display:flex; gap:20px; flex-wrap:wrap;}
textarea{width:48%; min-width:280px; min-height:400px; padding:15px; font-size:15px; line-height:1.6; border-radius:8px; border:1px solid #ddd; resize:none; overflow:auto;}
.preview{width:48%; min-width:280px; background:white; padding:30px; border-radius:10px; overflow:auto; max-width:640px;}
.h1{font-size:28px; font-weight:700; margin:30px 0 20px; text-align:center; font-family:'ZCOOL KuaiLe', cursive;}
.h2{font-size:22px; font-weight:bold; border-left:6px solid #1e90ff; padding-left:12px; margin:26px 0 14px;}
.h3{font-size:18px; font-weight:bold; color:#1e90ff; margin:20px 0 10px;}
.p{font-size:16px; line-height:1.8; color:#1e293b; margin:14px 0;}
.quote{border-left:4px solid #ccc; padding-left:12px; color:#555; margin:18px 0; font-family:'Ma Shan Zheng', cursive;}
.hr{border-top:1px solid #eee; margin:30px 0;}
.qa-q{font-weight:bold; margin-top:18px; font-family:'ZCOOL KuaiLe', cursive;}
.qa-a{margin:10px 0;}
.card{background:#f0f9ff; padding:15px; border-radius:6px; margin:15px 0; box-shadow:0 2px 6px rgba(0,0,0,0.05);}
figure{margin:15px 0; text-align:center;}
figure img{max-width:100%; border-radius:8px;}
figcaption{color:#666; font-size:14px; margin-top:6px; font-family:'Ma Shan Zheng', cursive;}
.meta{color:#888; font-size:14px; margin-bottom:10px;}

/* 动画 */
@keyframes float {0%{transform:translateY(0px) rotate(-2deg);}50%{transform:translateY(-8px) rotate(-1deg);}100%{transform:translateY(0px) rotate(-2deg);}}
.animate-float{animation:float 4s ease-in-out infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.animate-spin-slow{animation:spin 8s linear infinite;}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
@keyframes slide-in-bottom{from{transform:translateY(1rem);}to{transform:translateY(0);}}
.fade-in{animation:fade-in 0.5s both;}
.slide-in-bottom{animation:slide-in-bottom 0.5s both;}

@media(max-width:800px){.container{flex-direction:column;}.preview,textarea{width:100%;}}
</style>
</head>

<body>
<h1 class="animate-float">HOPE Design Lab · 最终版公众号排版器</h1>

<div class="toolbar fade-in mb-4">
  <button onclick="generate()" class="bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded">生成排版</button>
  <button onclick="copyHTML()" class="bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded">复制公众号HTML</button>
  <button onclick="uploadImage()" class="bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded">上传图片</button>
  <span id="meta" class="meta"></span>
  <input type="file" id="fileInput" style="display:none" accept="image/*">
</div>

<div class="container slide-in-bottom">
  <textarea id="input" placeholder="在这里粘贴或输入文章内容"></textarea>
  <div id="output" class="preview"></div>
</div>

<script>
const inputEl=document.getElementById("input");
const outputEl=document.getElementById("output");
const metaEl=document.getElementById("meta");
const fileInput=document.getElementById("fileInput");

// 自动扩展输入框
inputEl.addEventListener("input",()=>{inputEl.style.height="auto";inputEl.style.height=(inputEl.scrollHeight)+"px";});

// 图片上传
function uploadImage(){ fileInput.click(); }
fileInput.addEventListener("change",(e)=>{
  const file=e.target.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=function(evt){
      const markdown=`![${file.name}](${evt.target.result} "${file.name}")`;
      inputEl.value += "\n"+markdown+"\n";
      generate();
    }
    reader.readAsDataURL(file);
  }
});

// 排版生成
function generate(){
  const text=inputEl.value.replace(/\r/g,"").replace(/\n{3,}/g,"\n\n");
  const lines=text.split("\n");
  let html="",wordCount=0,inCard=false;

  lines.forEach(line=>{
    line=line.trim();
    if(line==="") return;
    wordCount+=line.length;

    if(line.startsWith("# ")){html+=`<p class="h1">${line.replace("# ","")}</p>`;}
    else if(line.startsWith("## ")){html+=`<p class="h2">${line.replace("## ","")}</p>`;}
    else if(line.startsWith("### ")){html+=`<p class="h3">${line.replace("### ","")}</p>`;}
    else if(line.startsWith("> ")){html+=`<p class="quote">${line.replace("> ","")}</p>`;}
    else if(line==="---"){html+=`<div class="hr"></div>`;}
    else if(line.startsWith("Q：")||line.startsWith("Q:")){html+=`<p class="qa-q">${line}</p>`;}
    else if(line.startsWith("A：")||line.startsWith("A:")){html+=`<p class="qa-a">${line}</p>`;}
    else if(line==="[活动信息]"){html+=`<div class="card">`;inCard=true;}
    else if(inCard && line===""){html+=`</div>`;inCard=false;}
    else if(inCard){html+=`<p class="p">${line}</p>`;}
    else if(line.startsWith("![") && line.includes("](")){
      let match=line.match(/!\[([^\]]*)\]\(([^ )]+)(?: \"([^\"]*)\")?\)/);
      if(match){ let alt=match[1], src=match[2], caption=match[3]||""; html+=`<figure><img src="${src}" alt="${alt}"><figcaption>${caption}</figcaption></figure>`;}
    } else {html+=`<p class="p">${line}</p>`;}
  });

  outputEl.innerHTML=html;
  metaEl.innerText=`字数 ${wordCount} · 预计阅读 ${Math.ceil(wordCount/300)} 分钟`;
}

// 一键复制
function copyHTML(){ navigator.clipboard.writeText(outputEl.innerHTML); alert("已复制，可直接粘贴到公众号编辑器"); }

window.onload=generate;
</script>
</body>
</html>
