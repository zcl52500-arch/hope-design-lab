<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPE Design Lab</title>
    <!-- 使用更稳定的 UMD 链接 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #F8FAFB; }
        .hope-blue { color: #2589D0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // ⚠️ 请在此处填入您的 API KEY
        const API_KEY = "AIzaSyC3SKI49gYQ0WZZzNJtaf5DyFkaN0OAs5s";

        function App() {
            const [tab, setTab] = useState('layout');
            const [text, setText] = useState('');

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b p-6 flex justify-between items-center shadow-sm">
                        <h1 className="text-xl font-black">HOPE <span className="hope-blue">Design Lab</span></h1>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setTab('layout')} className={`px-6 py-2 rounded-lg text-xs font-bold ${tab === 'layout' ? 'bg-white shadow-sm hope-blue' : 'text-slate-500'}`}>排版</button>
                            <button onClick={() => setTab('poster')} className={`px-6 py-2 rounded-lg text-xs font-bold ${tab === 'poster' ? 'bg-white shadow-sm hope-blue' : 'text-slate-500'}`}>海报</button>
                        </div>
                    </nav>
                    <main className="p-10 max-w-4xl mx-auto w-full text-center">
                        <h2 className="text-3xl font-bold mb-6">欢迎来到 HOPE 排版工坊</h2>
                        <textarea 
                            className="w-full h-64 p-6 rounded-2xl border-2 border-slate-100 mb-6 outline-none focus:border-blue-400"
                            placeholder="请粘贴文章内容..."
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                        />
                        <button className="bg-slate-900 text-white px-10 py-4 rounded-full font-bold hover:bg-blue-600 transition-all">
                            开始智能排版
                        </button>
                        <p className="mt-10 text-slate-400 text-sm">提示：请确保在代码中配置了正确的 API Key</p>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
